<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ローマ字タイピング</title>
  <style>
    :root{
      --bg:#ffffff;
      --fg:#111;
      --muted:#777;
      --red:#ff3b30;
      --blue:#007aff;

      /* finger tints (very light) */
      --pinky: rgba(255, 59, 48, .10);
      --ring:  rgba(255, 149, 0, .11);
      --middle:rgba(52, 199, 89, .11);
      --index: rgba(0, 122, 255, .10);
      --thumb: rgba(175, 82, 222, .10);

      --keyBorder: rgba(0,0,0,.10);
      --keyShadow: 0 1px 0 rgba(0,0,0,.06);
      --radius: 12px;
    }
    html,body{height:100%;}
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, "Hiragino Sans", "Noto Sans JP", Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      overflow:hidden;
    }
    .wrap{
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      padding:18px 14px 18px;
      box-sizing:border-box;
      gap:10px;
    }

    /* top mode toggle (no text except kana) */
    .top{
      width:100%;
      display:flex;
      justify-content:center;
      align-items:center;
      height:38px;
      user-select:none;
    }
    .modes{
      display:flex;
      gap:8px;
      padding:4px;
      border:1px solid rgba(0,0,0,.08);
      border-radius:999px;
    }
    .mode{
      width:44px;
      height:28px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:999px;
      font-weight:700;
      font-size:15px;
      color:rgba(0,0,0,.55);
      cursor:pointer;
    }
    .mode.active{
      color:#111;
      background:rgba(0,0,0,.06);
    }

    /* center prompt */
    .center{
      flex:1;
      width:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      position:relative;
      user-select:none;
    }
    .kana{
      font-size:min(22vw, 160px);
      font-weight:800;
      line-height:1;
      letter-spacing:0.02em;
    }
    .roman{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:center;
      height:54px;
    }
    .rbox{
      width:64px;
      height:54px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:14px;
      border:1px solid rgba(0,0,0,.10);
      box-shadow:var(--keyShadow);
      font-size:32px;
      font-weight:900;
      line-height:1;
    }
    .r1{ color:var(--red); }
    .r2{ color:var(--blue); }
    .rbox.dim{ color:rgba(0,0,0,.15); }

    .pulseOk{
      animation: okPop .18s ease-out;
    }
    @keyframes okPop{
      from{ transform:scale(0.98); filter:brightness(1); }
      to{ transform:scale(1.05); filter:brightness(1.05); }
    }
    .shake{
      animation: shake .20s ease-in-out;
    }
    @keyframes shake{
      0%{ transform:translateX(0); }
      25%{ transform:translateX(-6px); }
      50%{ transform:translateX(6px); }
      75%{ transform:translateX(-4px); }
      100%{ transform:translateX(0); }
    }

    /* keyboard */
    .kbArea{
      width:min(980px, 100%);
      padding-bottom:6px;
      position:relative;
    }
    .keyboard{
      width:100%;
      display:flex;
      flex-direction:column;
      gap:8px;
      user-select:none;
      touch-action:manipulation;
    }
    .row{
      display:flex;
      gap:8px;
      justify-content:center;
    }
    .key{
      height:52px;
      min-width:52px;
      padding:0 10px;
      box-sizing:border-box;
      border-radius:var(--radius);
      border:1px solid var(--keyBorder);
      box-shadow:var(--keyShadow);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      font-size:14px;
      background:#fff;
      position:relative;
      transition: transform .05s ease, filter .08s ease;
    }
    .key.small{ font-size:13px; font-weight:800; }
    .key.wide{ min-width:86px; justify-content:flex-start; padding-left:12px; }
    .key.xwide{ min-width:120px; justify-content:flex-start; padding-left:12px; }
    .key.space{ min-width:320px; }
    .key.kbDown{ transform:translateY(1px); filter:brightness(0.98); }

    /* finger colors */
    .f-pinky{ background:var(--pinky); }
    .f-ring{ background:var(--ring); }
    .f-middle{ background:var(--middle); }
    .f-index{ background:var(--index); }
    .f-thumb{ background:var(--thumb); }

    /* target highlights */
    .hl{
      position:absolute;
      inset:-2px;
      border-radius:calc(var(--radius) + 2px);
      pointer-events:none;
      opacity:0;
      transform:scale(0.98);
      transition:opacity .08s ease, transform .08s ease;
      border:2px solid transparent;
    }
    .key.target1 .hl{
      opacity:1;
      transform:scale(1);
      border-color:rgba(255,59,48,.95);
      box-shadow:0 0 0 3px rgba(255,59,48,.15);
    }
    .key.target2 .hl{
      opacity:1;
      transform:scale(1);
      border-color:rgba(0,122,255,.95);
      box-shadow:0 0 0 3px rgba(0,122,255,.14);
    }

    /* fireworks canvas */
    canvas#fx{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    /* keep things visually minimal on small screens */
    @media (max-width:520px){
      .key{ height:46px; min-width:44px; border-radius:11px; }
      .key.wide{ min-width:74px; }
      .key.xwide{ min-width:104px; }
      .key.space{ min-width:240px; }
      .rbox{ width:56px; height:48px; font-size:28px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="modes" aria-label="mode">
        <div class="mode active" data-mode="a">あ</div>
        <div class="mode" data-mode="ka">か</div>
      </div>
    </div>

    <div class="center" id="center">
      <canvas id="fx"></canvas>
      <div class="kana" id="kana">あ</div>
      <div class="roman" id="roman">
        <div class="rbox r1" id="r1">A</div>
        <div class="rbox r2 dim" id="r2">—</div>
      </div>
    </div>

    <div class="kbArea">
      <div class="keyboard" id="keyboard"></div>
    </div>
  </div>

<script>
(() => {
  /* ---------------------------
     Data
  --------------------------- */

  const sets = {
    a: [
      { kana:"あ", roma:"a" }, { kana:"い", roma:"i" }, { kana:"う", roma:"u" }, { kana:"え", roma:"e" }, { kana:"お", roma:"o" }
    ],
    ka: [
      { kana:"か", roma:"ka" }, { kana:"き", roma:"ki" }, { kana:"く", roma:"ku" }, { kana:"け", roma:"ke" }, { kana:"こ", roma:"ko" }
    ]
  };

  // US keyboard layout (accurate positions/keys)
  const layout = [
    [
      { code:"Backquote", label:"`" },
      { code:"Digit1", label:"1" },
      { code:"Digit2", label:"2" },
      { code:"Digit3", label:"3" },
      { code:"Digit4", label:"4" },
      { code:"Digit5", label:"5" },
      { code:"Digit6", label:"6" },
      { code:"Digit7", label:"7" },
      { code:"Digit8", label:"8" },
      { code:"Digit9", label:"9" },
      { code:"Digit0", label:"0" },
      { code:"Minus", label:"-" },
      { code:"Equal", label:"=" },
      { code:"Backspace", label:"Backspace", wide:true, cls:"small" },
    ],
    [
      { code:"Tab", label:"Tab", wide:true, cls:"small" },
      { code:"KeyQ", label:"Q" },
      { code:"KeyW", label:"W" },
      { code:"KeyE", label:"E" },
      { code:"KeyR", label:"R" },
      { code:"KeyT", label:"T" },
      { code:"KeyY", label:"Y" },
      { code:"KeyU", label:"U" },
      { code:"KeyI", label:"I" },
      { code:"KeyO", label:"O" },
      { code:"KeyP", label:"P" },
      { code:"BracketLeft", label:"[" },
      { code:"BracketRight", label:"]" },
      { code:"Backslash", label:"\\", wide:false },
    ],
    [
      { code:"CapsLock", label:"Caps", xwide:true, cls:"small" },
      { code:"KeyA", label:"A" },
      { code:"KeyS", label:"S" },
      { code:"KeyD", label:"D" },
      { code:"KeyF", label:"F" },
      { code:"KeyG", label:"G" },
      { code:"KeyH", label:"H" },
      { code:"KeyJ", label:"J" },
      { code:"KeyK", label:"K" },
      { code:"KeyL", label:"L" },
      { code:"Semicolon", label:";" },
      { code:"Quote", label:"'" },
      { code:"Enter", label:"Enter", xwide:true, cls:"small" },
    ],
    [
      { code:"ShiftLeft", label:"Shift", xwide:true, cls:"small" },
      { code:"KeyZ", label:"Z" },
      { code:"KeyX", label:"X" },
      { code:"KeyC", label:"C" },
      { code:"KeyV", label:"V" },
      { code:"KeyB", label:"B" },
      { code:"KeyN", label:"N" },
      { code:"KeyM", label:"M" },
      { code:"Comma", label:"," },
      { code:"Period", label:"." },
      { code:"Slash", label:"/" },
      { code:"ShiftRight", label:"Shift", xwide:true, cls:"small" },
    ],
    [
      { code:"ControlLeft", label:"Ctrl", wide:true, cls:"small" },
      { code:"MetaLeft", label:"Win", wide:true, cls:"small" },
      { code:"AltLeft", label:"Alt", wide:true, cls:"small" },
      { code:"Space", label:"", space:true },
      { code:"AltRight", label:"Alt", wide:true, cls:"small" },
      { code:"MetaRight", label:"Win", wide:true, cls:"small" },
      { code:"ContextMenu", label:"Menu", wide:true, cls:"small" },
      { code:"ControlRight", label:"Ctrl", wide:true, cls:"small" },
    ],
  ];

  // Finger assignment by key code (includes right pinky keys explicitly)
  const fingerByCode = new Map();

  const add = (codes, fingerClass) => codes.forEach(c => fingerByCode.set(c, fingerClass));

  // Left hand
  add(["Backquote","Digit1","KeyQ","KeyA","KeyZ","Tab","CapsLock","ShiftLeft","ControlLeft"], "f-pinky");
  add(["Digit2","KeyW","KeyS","KeyX"], "f-ring");
  add(["Digit3","KeyE","KeyD","KeyC"], "f-middle");
  add(["Digit4","Digit5","KeyR","KeyT","KeyF","KeyG","KeyV","KeyB"], "f-index");

  // Right hand
  add(["Digit6","Digit7","KeyY","KeyU","KeyH","KeyJ","KeyN","KeyM"], "f-index");
  add(["Digit8","KeyI","KeyK","Comma"], "f-middle");
  add(["Digit9","KeyO","KeyL","Period"], "f-ring");

  // Right pinky (FIX: include all requested right-pinky keys)
  add([
    "Digit0","Minus","Equal",
    "KeyP","BracketLeft","BracketRight","Backslash",
    "Semicolon","Quote","Slash",
    "Enter","Backspace","ShiftRight",
    "ControlRight"
  ], "f-pinky");

  // Thumbs
  add(["Space","AltLeft","AltRight","MetaLeft","MetaRight","ContextMenu"], "f-thumb");

  // char -> key code (for highlighting)
  const charToCode = new Map([
    ["a","KeyA"],["b","KeyB"],["c","KeyC"],["d","KeyD"],["e","KeyE"],["f","KeyF"],["g","KeyG"],["h","KeyH"],
    ["i","KeyI"],["j","KeyJ"],["k","KeyK"],["l","KeyL"],["m","KeyM"],["n","KeyN"],["o","KeyO"],["p","KeyP"],
    ["q","KeyQ"],["r","KeyR"],["s","KeyS"],["t","KeyT"],["u","KeyU"],["v","KeyV"],["w","KeyW"],["x","KeyX"],
    ["y","KeyY"],["z","KeyZ"],
    ["`","Backquote"],["1","Digit1"],["2","Digit2"],["3","Digit3"],["4","Digit4"],["5","Digit5"],
    ["6","Digit6"],["7","Digit7"],["8","Digit8"],["9","Digit9"],["0","Digit0"],
    ["-","Minus"],["=","Equal"],["[","BracketLeft"],["]","BracketRight"],["\\","Backslash"],
    [";","Semicolon"],["'","Quote"],[",","Comma"],[".","Period"],["/","Slash"],[" ","Space"]
  ]);

  /* ---------------------------
     DOM
  --------------------------- */

  const elKeyboard = document.getElementById("keyboard");
  const elKana = document.getElementById("kana");
  const elR1 = document.getElementById("r1");
  const elR2 = document.getElementById("r2");
  const elCenter = document.getElementById("center");
  const elFx = document.getElementById("fx");

  const keyElsByCode = new Map();

  function buildKeyboard(){
    elKeyboard.innerHTML = "";
    layout.forEach(row => {
      const r = document.createElement("div");
      r.className = "row";
      row.forEach(k => {
        const d = document.createElement("div");
        d.className = "key";
        if (k.cls) d.classList.add(k.cls);
        if (k.wide) d.classList.add("wide");
        if (k.xwide) d.classList.add("xwide");
        if (k.space) d.classList.add("space");

        const finger = fingerByCode.get(k.code);
        if (finger) d.classList.add(finger);

        d.dataset.code = k.code;

        const label = document.createElement("div");
        label.textContent = k.label;
        d.appendChild(label);

        const hl = document.createElement("div");
        hl.className = "hl";
        d.appendChild(hl);

        keyElsByCode.set(k.code, d);
        r.appendChild(d);
      });
      elKeyboard.appendChild(r);
    });
  }

  buildKeyboard();

  /* ---------------------------
     Audio (WebAudio)
  --------------------------- */

  let audioCtx = null;

  function ensureAudio(){
    if (!audioCtx){
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
  }

  // light, pleasant correct sound (short blip + shimmer)
  function playOk(){
    if (!audioCtx) return;

    const t0 = audioCtx.currentTime;

    // main tone
    const o1 = audioCtx.createOscillator();
    const g1 = audioCtx.createGain();
    o1.type = "triangle";
    o1.frequency.setValueAtTime(880, t0);
    o1.frequency.exponentialRampToValueAtTime(1320, t0 + 0.06);

    g1.gain.setValueAtTime(0.0001, t0);
    g1.gain.exponentialRampToValueAtTime(0.22, t0 + 0.01);
    g1.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.10);

    o1.connect(g1).connect(audioCtx.destination);
    o1.start(t0);
    o1.stop(t0 + 0.12);

    // tiny sparkle
    const o2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    o2.type = "sine";
    o2.frequency.setValueAtTime(1760, t0);
    g2.gain.setValueAtTime(0.0001, t0);
    g2.gain.exponentialRampToValueAtTime(0.10, t0 + 0.008);
    g2.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.06);

    o2.connect(g2).connect(audioCtx.destination);
    o2.start(t0);
    o2.stop(t0 + 0.07);
  }

  // miss sound: soft “thud” (filtered noise)
  function playMiss(){
    if (!audioCtx) return;

    const t0 = audioCtx.currentTime;

    const bufferSize = Math.floor(audioCtx.sampleRate * 0.12);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i=0; i<bufferSize; i++){
      const x = i / bufferSize;
      // decaying noise
      data[i] = (Math.random()*2-1) * Math.pow(1 - x, 2.6);
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;

    const filter = audioCtx.createBiquadFilter();
    filter.type = "lowpass";
    filter.frequency.setValueAtTime(520, t0);
    filter.Q.setValueAtTime(0.9, t0);

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.28, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.12);

    noise.connect(filter).connect(gain).connect(audioCtx.destination);
    noise.start(t0);
    noise.stop(t0 + 0.13);
  }

  /* ---------------------------
     Fireworks (Canvas)
  --------------------------- */

  const fx = {
    w: 0, h: 0,
    ctx: null,
    particles: [],
    last: 0
  };

  function resizeFx(){
    const rect = elCenter.getBoundingClientRect();
    elFx.width = Math.floor(rect.width * devicePixelRatio);
    elFx.height = Math.floor(rect.height * devicePixelRatio);
    elFx.style.width = rect.width + "px";
    elFx.style.height = rect.height + "px";
    fx.w = elFx.width;
    fx.h = elFx.height;
    fx.ctx = elFx.getContext("2d");
  }
  window.addEventListener("resize", resizeFx, {passive:true});
  resizeFx();

  function spawnFirework(strength=1){
    // strength grows with streak
    const ctx = fx.ctx;
    if (!ctx) return;

    const cx = (Math.random()*0.72 + 0.14) * fx.w;
    const cy = (Math.random()*0.45 + 0.18) * fx.h;

    const count = Math.floor(18 + 10 * Math.min(3.0, strength));
    const speed = (1.8 + 1.2 * Math.min(3.0, strength)) * devicePixelRatio;
    const life = 520 + 220 * Math.min(3.0, strength);

    for (let i=0; i<count; i++){
      const a = (Math.PI*2) * (i / count) + (Math.random()*0.10);
      const v = speed * (0.55 + Math.random()*0.75);
      fx.particles.push({
        x: cx, y: cy,
        vx: Math.cos(a)*v,
        vy: Math.sin(a)*v,
        r: (1.2 + Math.random()*1.4) * devicePixelRatio,
        life,
        born: performance.now(),
        // no fixed palette; derive from direction for subtle variety
        hue: (i*360/count + Math.random()*18) % 360
      });
    }
  }

  function stepFx(ts){
    if (!fx.ctx) return requestAnimationFrame(stepFx);
    const ctx = fx.ctx;
    const dt = Math.min(34, ts - (fx.last || ts));
    fx.last = ts;

    ctx.clearRect(0,0,fx.w,fx.h);

    const now = ts;
    fx.particles = fx.particles.filter(p => {
      const age = now - p.born;
      if (age > p.life) return false;

      const t = age / p.life;
      p.vy += 0.0035 * dt * devicePixelRatio; // gravity
      p.x += p.vx * (dt/16);
      p.y += p.vy * (dt/16);

      const alpha = Math.pow(1 - t, 1.6);
      ctx.beginPath();
      ctx.fillStyle = `hsla(${p.hue}, 95%, 55%, ${alpha})`;
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();

      // tiny trail
      ctx.strokeStyle = `hsla(${p.hue}, 95%, 55%, ${alpha*0.35})`;
      ctx.lineWidth = 2 * devicePixelRatio;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx*0.10, p.y - p.vy*0.10);
      ctx.stroke();

      return true;
    });

    requestAnimationFrame(stepFx);
  }
  requestAnimationFrame(stepFx);

  /* ---------------------------
     Game State
  --------------------------- */

  let mode = "a";
  let started = false;

  let current = null;     // {kana, roma}
  let idx = 0;            // current expected char index in roma
  let streak = 0;

  function pickNext(){
    const arr = sets[mode];
    current = arr[Math.floor(Math.random() * arr.length)];
    idx = 0;
    renderPrompt();
    updateTargets();
  }

  function renderPrompt(){
    elKana.textContent = current.kana;

    const r = current.roma.toUpperCase();
    const c1 = r[0] || "";
    const c2 = r[1] || "";

    elR1.textContent = c1 || "—";
    if (c2){
      elR2.classList.remove("dim");
      elR2.textContent = c2;
    } else {
      elR2.classList.add("dim");
      elR2.textContent = "—";
    }
  }

  function clearTargets(){
    for (const el of keyElsByCode.values()){
      el.classList.remove("target1","target2");
    }
  }

  function updateTargets(){
    clearTargets();

    const roma = current.roma.toLowerCase();
    const c1 = roma[0];
    const c2 = roma[1];

    const code1 = charToCode.get(c1);
    if (code1 && keyElsByCode.has(code1)) keyElsByCode.get(code1).classList.add("target1");

    if (c2){
      const code2 = charToCode.get(c2);
      if (code2 && keyElsByCode.has(code2)) keyElsByCode.get(code2).classList.add("target2");
    }
  }

  function pressKeyVisual(code){
    const el = keyElsByCode.get(code);
    if (!el) return;
    el.classList.add("kbDown");
    setTimeout(() => el.classList.remove("kbDown"), 60);
  }

  function okVisual(){
    elKana.classList.remove("pulseOk");
    void elKana.offsetWidth;
    elKana.classList.add("pulseOk");
  }

  function missVisual(){
    elCenter.classList.remove("shake");
    void elCenter.offsetWidth;
    elCenter.classList.add("shake");
  }

  function startIfNeeded(){
    if (started) return;
    started = true;
    pickNext();
  }

  /* ---------------------------
     Input Handling
  --------------------------- */

  document.addEventListener("pointerdown", () => {
    // allow iOS/Safari to unlock audio on first gesture
    ensureAudio();
  }, {passive:true});

  document.addEventListener("keydown", (e) => {
    // prevent page scroll on Space
    if (e.code === "Space") e.preventDefault();

    ensureAudio();

    pressKeyVisual(e.code);

    // Space starts
    if (!started){
      if (e.code === "Space"){
        startIfNeeded();
      }
      return;
    }

    // ignore modifier-only
    if (e.key.length !== 1) return;

    const expected = current.roma.toLowerCase()[idx];
    if (!expected) return;

    const got = e.key.toLowerCase();
    if (got === expected){
      // correct char
      playOk();

      idx++;
      okVisual();

      // if finished kana (full romaji)
      if (idx >= current.roma.length){
        streak++;
        spawnFirework(Math.min(4, 1 + streak * 0.18)); // bigger with streak
        pickNext();
      } else {
        // second letter now "active" (no UI text; keep highlights as red/blue)
      }
    } else {
      // wrong
      streak = 0;
      playMiss();
      missVisual();
    }
  }, {passive:false});

  /* ---------------------------
     Mode Toggle (no extra text)
  --------------------------- */

  document.querySelectorAll(".mode").forEach(btn => {
    btn.addEventListener("click", () => {
      const m = btn.dataset.mode;
      if (m === mode) return;
      mode = m;

      document.querySelectorAll(".mode").forEach(b => b.classList.toggle("active", b.dataset.mode === mode));

      // reset run
      started = false;
      streak = 0;
      current = sets[mode][0];
      idx = 0;
      renderPrompt();
      clearTargets();
    }, {passive:true});
  });

  // initial prompt (idle)
  current = sets[mode][0];
  renderPrompt();
  clearTargets();

})();
</script>
</body>
</html>
