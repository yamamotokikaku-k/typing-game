<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ローマ字タイピング（こども）</title>
  <style>
    :root{
      --bg:#ffffff;
      --fg:#111;
      --muted:#666;
      --line:#e8e8e8;

      --red:#ff3b30;
      --blue:#007aff;

      --zone1:#ffe6e6; /* L pinky */
      --zone2:#fff2d9; /* L ring */
      --zone3:#fffbd9; /* L middle */
      --zone4:#e8f7ff; /* L index */
      --zone5:#e8fff1; /* R index */
      --zone6:#eef1ff; /* R middle */
      --zone7:#f3e8ff; /* R ring */
      --zone8:#ffe8f6; /* R pinky */
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
      background:var(--bg);
      color:var(--fg);
    }

    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 14px 18px;
    }

    .topbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
      padding-bottom:10px;
      border-bottom:1px solid var(--line);
    }
    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    select, button{
      font:inherit;
      border:1px solid var(--line);
      background:#fff;
      padding:8px 10px;
      border-radius:10px;
    }
    button{
      cursor:pointer;
      user-select:none;
    }
    .hint{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    .stage{
      display:grid;
      gap:10px;
      margin-top:8px;
    }

    .kana{
      text-align:center;
      font-size:72px;
      line-height:1.05;
      font-weight:800;
      letter-spacing: 0.02em;
      margin: 6px 0 0;
    }
    @media (max-width:520px){
      .kana{font-size:56px}
    }

    /* ROMAJI blocks (guide = shortest romaji) */
    .romaji{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin: 2px 0 0;
      min-height: 64px;
    }
    .letter{
      width: 52px;
      height: 52px;
      border-radius: 14px;
      border: 2px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:800;
      letter-spacing:0.02em;
      background:#fff;
      color:#222;
    }
    .letter.done{
      color:#bbb;
      border-color:#f0f0f0;
      background:#fff;
    }
    .letter.cur{
      border-color: color-mix(in srgb, var(--red) 70%, #fff);
      background: color-mix(in srgb, var(--red) 10%, #fff);
      color: var(--red);
    }
    .letter.next{
      border-color: color-mix(in srgb, var(--blue) 70%, #fff);
      background: color-mix(in srgb, var(--blue) 9%, #fff);
      color: var(--blue);
    }

    /* Row stars */
    .rowbar{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:6px;
      padding-top:10px;
      border-top:1px solid var(--line);
    }
    .rowchip{
      display:flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
      background:#fff;
      font-size:12px;
      color:#222;
      user-select:none;
    }
    .star{
      font-size:14px;
      color:#bbb;
      line-height:1;
    }
    .star.cleared{color:#ffcc00}
    .rowchip.active{
      border-color:#cfcfcf;
      box-shadow: 0 0 0 2px #f3f3f3 inset;
      font-weight:800;
    }

    /* Keyboard */
    .kbdWrap{ margin-top: 8px; }

    .kbd{
      position:relative;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 14px 12px;
      background:#fff;
      overflow:hidden;
    }

    /* background zones */
    .zones{
      position:absolute;
      inset:0;
      display:grid;
      grid-template-columns: 1fr 1fr 1fr 1.35fr 1.35fr 1fr 1fr 1fr;
      opacity:0.35;               /* うすく */
      pointer-events:none;
    }
    .z1{background:var(--zone1)}
    .z2{background:var(--zone2)}
    .z3{background:var(--zone3)}
    .z4{background:var(--zone4)}
    .z5{background:var(--zone5)}
    .z6{background:var(--zone6)}
    .z7{background:var(--zone7)}
    .z8{background:var(--zone8)}

    .keys{
      position:relative;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .row{
      display:flex;
      justify-content:center;
      gap:6px;
      flex-wrap:nowrap;
    }
    .key{
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: 2px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      letter-spacing:0.02em;
      background:#fff;
      user-select:none;
      font-size:14px;
      color:#222;
    }
    .key.wide{width: 74px}
    .key.space{width: 320px}
    @media (max-width:520px){
      .key{width: 38px; height: 42px; border-radius:10px}
      .key.wide{width: 62px}
      .key.space{width: 240px}
    }

    /* keep RED=now, BLUE=next (no color swapping effect) */
    .key.cur{
      border-color: color-mix(in srgb, var(--red) 75%, #fff);
      background: color-mix(in srgb, var(--red) 12%, #fff);
      color: var(--red);
    }
    .key.next{
      border-color: color-mix(in srgb, var(--blue) 75%, #fff);
      background: color-mix(in srgb, var(--blue) 10%, #fff);
      color: var(--blue);
    }

    .status{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      margin-top:8px;
      line-height:1.35;
      min-height: 20px;
    }
    .tiny{
      font-size:12px;
      color:var(--muted);
      text-align:center;
      margin-top:10px;
    }

    /* Hands (no text) */
    .handsWrap{
      display:flex;
      justify-content:center;
      margin-top:10px;
    }
    .hands{
      width:min(820px, 100%);
      border:1px solid var(--line);
      border-radius:18px;
      padding:10px 10px 6px;
      background:#fff;
      overflow:hidden;
    }
    .hands svg{ width:100%; height:auto; display:block; }
    .finger{
      fill:#e6e6e6;
      stroke:#d8d8d8;
      stroke-width:2;
    }
    .fingerNow{
      fill: color-mix(in srgb, var(--red) 18%, #fff);
      stroke: var(--red);
      stroke-width:4;
    }
    .fingerNext{
      fill: color-mix(in srgb, var(--blue) 14%, #fff);
      stroke: var(--blue);
      stroke-width:4;
    }
    /* same finger for now+next */
    .fingerNow.fingerNext{
      fill: color-mix(in srgb, var(--red) 12%, var(--blue) 12%, #fff);
      stroke: #7b61ff;
      stroke-width:5;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="controls">
        <select id="courseSel" aria-label="コース">
          <option value="basic">基本（あ〜わ）</option>
          <option value="dakuten">濁点</option>
          <option value="youon">拗音（きゃ等）</option>
          <option value="sokuon">促音（っ）</option>
        </select>

        <select id="modeSel" aria-label="モード">
          <option value="normal">通常モード（行を順番）</option>
          <option value="row">行練習モード（同じ行をくり返し）</option>
        </select>

        <select id="rowSel" aria-label="行" style="display:none"></select>

        <button id="resetBtn" type="button">リセット</button>
      </div>

      <div class="hint" id="hint">Enterでスタート</div>
    </div>

    <div class="stage">
      <div class="kana" id="kana">—</div>
      <div class="romaji" id="romaji"></div>

      <div class="rowbar" id="rowbar"></div>

      <div class="kbdWrap">
        <div class="kbd" id="kbd">
          <div class="zones" aria-hidden="true">
            <div class="z1"></div><div class="z2"></div><div class="z3"></div><div class="z4"></div>
            <div class="z5"></div><div class="z6"></div><div class="z7"></div><div class="z8"></div>
          </div>

          <div class="keys" id="keys">
            <div class="row">
              <div class="key wide" data-k="Tab">Tab</div>
              <div class="key" data-k="q">Q</div><div class="key" data-k="w">W</div><div class="key" data-k="e">E</div><div class="key" data-k="r">R</div><div class="key" data-k="t">T</div>
              <div class="key" data-k="y">Y</div><div class="key" data-k="u">U</div><div class="key" data-k="i">I</div><div class="key" data-k="o">O</div><div class="key" data-k="p">P</div>
              <div class="key wide" data-k="Backspace">⌫</div>
            </div>

            <div class="row">
              <div class="key wide" data-k="CapsLock">Caps</div>
              <div class="key" data-k="a">A</div><div class="key" data-k="s">S</div><div class="key" data-k="d">D</div><div class="key" data-k="f">F</div><div class="key" data-k="g">G</div>
              <div class="key" data-k="h">H</div><div class="key" data-k="j">J</div><div class="key" data-k="k">K</div><div class="key" data-k="l">L</div>
              <div class="key wide" data-k="Enter">Enter</div>
            </div>

            <div class="row">
              <div class="key wide" data-k="Shift">Shift</div>
              <div class="key" data-k="z">Z</div><div class="key" data-k="x">X</div><div class="key" data-k="c">C</div><div class="key" data-k="v">V</div><div class="key" data-k="b">B</div>
              <div class="key" data-k="n">N</div><div class="key" data-k="m">M</div>
              <div class="key wide" data-k="ShiftRight">Shift</div>
            </div>

            <div class="row">
              <div class="key space" data-k=" ">SPACE</div>
            </div>
          </div>
        </div>

        <div class="handsWrap">
          <div class="hands" aria-label="手（使う指が光る）">
            <!-- 8 fingers + thumbs (simple) -->
            <svg viewBox="0 0 900 220" role="img" aria-label="手">
              <!-- Left hand -->
              <g transform="translate(40,30)">
                <!-- fingers -->
                <rect id="L5" class="finger" x="0"   y="55" width="70" height="140" rx="30"/>
                <rect id="L4" class="finger" x="80"  y="25" width="70" height="170" rx="30"/>
                <rect id="L3" class="finger" x="160" y="10" width="70" height="185" rx="30"/>
                <rect id="L2" class="finger" x="240" y="25" width="70" height="170" rx="30"/>
                <!-- thumb -->
                <rect id="LT" class="finger" x="260" y="140" width="110" height="60" rx="26" transform="rotate(-18 260 140)"/>
              </g>

              <!-- Right hand -->
              <g transform="translate(480,30)">
                <!-- thumb -->
                <rect id="RT" class="finger" x="120" y="140" width="110" height="60" rx="26" transform="rotate(18 230 140)"/>
                <!-- fingers -->
                <rect id="R2" class="finger" x="200" y="25" width="70" height="170" rx="30"/>
                <rect id="R3" class="finger" x="280" y="10" width="70" height="185" rx="30"/>
                <rect id="R4" class="finger" x="360" y="25" width="70" height="170" rx="30"/>
                <rect id="R5" class="finger" x="440" y="55" width="70" height="140" rx="30"/>
              </g>
            </svg>
          </div>
        </div>

        <div class="status" id="status"></div>
      </div>

      <div class="tiny">
        訓令式ベース + 許可: SI/SHI, TI/CHI, TU/TSU, HU/FU など
      </div>
    </div>
  </div>

  <script>
    // ===========
    // Data
    // ===========
    const COURSE_ROWS = {
      basic: [
        {id:"a", label:"あ行"},
        {id:"ka", label:"か行"},
        {id:"sa", label:"さ行"},
        {id:"ta", label:"た行"},
        {id:"na", label:"な行"},
        {id:"ha", label:"は行"},
        {id:"ma", label:"ま行"},
        {id:"ya", label:"や行"},
        {id:"ra", label:"ら行"},
        {id:"wa", label:"わ行"},
      ],
      dakuten: [
        {id:"ga", label:"が行"},
        {id:"za", label:"ざ行"},
        {id:"da", label:"だ行"},
        {id:"ba", label:"ば行"},
        {id:"pa", label:"ぱ行"},
      ],
      youon: [
        {id:"kya", label:"きゃ行"},
        {id:"sya", label:"しゃ行"},
        {id:"tya", label:"ちゃ行"},
        {id:"nya", label:"にゃ行"},
        {id:"hya", label:"ひゃ行"},
        {id:"mya", label:"みゃ行"},
        {id:"rya", label:"りゃ行"},
        {id:"gya", label:"ぎゃ行"},
        {id:"bya", label:"びゃ行"},
        {id:"pya", label:"ぴゃ行"},
      ],
      sokuon: [
        {id:"k", label:"っk（か行）"},
        {id:"s", label:"っs（さ行）"},
        {id:"t", label:"っt（た行）"},
        {id:"p", label:"っp（ぱ行）"},
      ]
    };

    function E(course, row, kana, accepts){
      return {course, row, kana, accepts: accepts.map(s=>s.toLowerCase())};
    }

    const BASIC = [
      E("basic","a","あ",["a"]), E("basic","a","い",["i"]), E("basic","a","う",["u"]), E("basic","a","え",["e"]), E("basic","a","お",["o"]),
      E("basic","ka","か",["ka"]), E("basic","ka","き",["ki"]), E("basic","ka","く",["ku"]), E("basic","ka","け",["ke"]), E("basic","ka","こ",["ko"]),
      E("basic","sa","さ",["sa"]), E("basic","sa","し",["si","shi"]), E("basic","sa","す",["su"]), E("basic","sa","せ",["se"]), E("basic","sa","そ",["so"]),
      E("basic","ta","た",["ta"]), E("basic","ta","ち",["ti","chi"]), E("basic","ta","つ",["tu","tsu"]), E("basic","ta","て",["te"]), E("basic","ta","と",["to"]),
      E("basic","na","な",["na"]), E("basic","na","に",["ni"]), E("basic","na","ぬ",["nu"]), E("basic","na","ね",["ne"]), E("basic","na","の",["no"]),
      E("basic","ha","は",["ha"]), E("basic","ha","ひ",["hi"]), E("basic","ha","ふ",["hu","fu"]), E("basic","ha","へ",["he"]), E("basic","ha","ほ",["ho"]),
      E("basic","ma","ま",["ma"]), E("basic","ma","み",["mi"]), E("basic","ma","む",["mu"]), E("basic","ma","め",["me"]), E("basic","ma","も",["mo"]),
      E("basic","ya","や",["ya"]), E("basic","ya","ゆ",["yu"]), E("basic","ya","よ",["yo"]),
      E("basic","ra","ら",["ra"]), E("basic","ra","り",["ri"]), E("basic","ra","る",["ru"]), E("basic","ra","れ",["re"]), E("basic","ra","ろ",["ro"]),
      E("basic","wa","わ",["wa"]), E("basic","wa","を",["wo","o"]), E("basic","wa","ん",["n","nn"]),
    ];

    const DAKUTEN = [
      E("dakuten","ga","が",["ga"]), E("dakuten","ga","ぎ",["gi"]), E("dakuten","ga","ぐ",["gu"]), E("dakuten","ga","げ",["ge"]), E("dakuten","ga","ご",["go"]),
      E("dakuten","za","ざ",["za"]), E("dakuten","za","じ",["zi","ji"]), E("dakuten","za","ず",["zu"]), E("dakuten","za","ぜ",["ze"]), E("dakuten","za","ぞ",["zo"]),
      E("dakuten","da","だ",["da"]), E("dakuten","da","ぢ",["di","ji"]), E("dakuten","da","づ",["du","zu"]), E("dakuten","da","で",["de"]), E("dakuten","da","ど",["do"]),
      E("dakuten","ba","ば",["ba"]), E("dakuten","ba","び",["bi"]), E("dakuten","ba","ぶ",["bu"]), E("dakuten","ba","べ",["be"]), E("dakuten","ba","ぼ",["bo"]),
      E("dakuten","pa","ぱ",["pa"]), E("dakuten","pa","ぴ",["pi"]), E("dakuten","pa","ぷ",["pu"]), E("dakuten","pa","ぺ",["pe"]), E("dakuten","pa","ぽ",["po"]),
    ];

    const YOUON = [
      E("youon","kya","きゃ",["kya"]), E("youon","kya","きゅ",["kyu"]), E("youon","kya","きょ",["kyo"]),
      E("youon","sya","しゃ",["sya","sha"]), E("youon","sya","しゅ",["syu","shu"]), E("youon","sya","しょ",["syo","sho"]),
      E("youon","tya","ちゃ",["tya","cha"]), E("youon","tya","ちゅ",["tyu","chu"]), E("youon","tya","ちょ",["tyo","cho"]),
      E("youon","nya","にゃ",["nya"]), E("youon","nya","にゅ",["nyu"]), E("youon","nya","にょ",["nyo"]),
      E("youon","hya","ひゃ",["hya"]), E("youon","hya","ひゅ",["hyu"]), E("youon","hya","ひょ",["hyo"]),
      E("youon","mya","みゃ",["mya"]), E("youon","mya","みゅ",["myu"]), E("youon","mya","みょ",["myo"]),
      E("youon","rya","りゃ",["rya"]), E("youon","rya","りゅ",["ryu"]), E("youon","rya","りょ",["ryo"]),
      E("youon","gya","ぎゃ",["gya"]), E("youon","gya","ぎゅ",["gyu"]), E("youon","gya","ぎょ",["gyo"]),
      E("youon","bya","びゃ",["bya"]), E("youon","bya","びゅ",["byu"]), E("youon","bya","びょ",["byo"]),
      E("youon","pya","ぴゃ",["pya"]), E("youon","pya","ぴゅ",["pyu"]), E("youon","pya","ぴょ",["pyo"]),
    ];

    const SOKUON = [
      E("sokuon","k","っか",["kka"]), E("sokuon","k","っき",["kki"]), E("sokuon","k","っく",["kku"]), E("sokuon","k","っけ",["kke"]), E("sokuon","k","っこ",["kko"]),
      E("sokuon","s","っさ",["ssa"]), E("sokuon","s","っし",["ssi","sshi"]), E("sokuon","s","っす",["ssu"]), E("sokuon","s","っせ",["sse"]), E("sokuon","s","っそ",["sso"]),
      E("sokuon","t","った",["tta"]),
      E("sokuon","t","っち",["tti","cchi"]),
      E("sokuon","t","っつ",["ttu","ttsu"]),
      E("sokuon","t","って",["tte"]),
      E("sokuon","t","っと",["tto"]),
      E("sokuon","p","っぱ",["ppa"]), E("sokuon","p","っぴ",["ppi"]), E("sokuon","p","っぷ",["ppu"]), E("sokuon","p","っぺ",["ppe"]), E("sokuon","p","っぽ",["ppo"]),
    ];

    const ALL = [...BASIC, ...DAKUTEN, ...YOUON, ...SOKUON];

    // ===========
    // Finger map (keys -> finger IDs in SVG)
    // ===========
    const fingerMap = {
      q:"L5", a:"L5", z:"L5",
      w:"L4", s:"L4", x:"L4",
      e:"L3", d:"L3", c:"L3",
      r:"L2", t:"L2", f:"L2", g:"L2", v:"L2", b:"L2",

      y:"R2", u:"R2", h:"R2", j:"R2", n:"R2", m:"R2",
      i:"R3", k:"R3",
      o:"R4", l:"R4",
      p:"R5",

      " ":"RT" // space = 親指（簡略で右）
    };

    // ===========
    // Elements
    // ===========
    const els = {
      courseSel: document.getElementById("courseSel"),
      modeSel: document.getElementById("modeSel"),
      rowSel: document.getElementById("rowSel"),
      resetBtn: document.getElementById("resetBtn"),
      hint: document.getElementById("hint"),
      kana: document.getElementById("kana"),
      romaji: document.getElementById("romaji"),
      rowbar: document.getElementById("rowbar"),
      status: document.getElementById("status"),
      keysRoot: document.getElementById("keys"),
    };

    // ===========
    // State
    // ===========
    let running = false;

    let course = "basic";
    let mode = "normal";
    let rowId = COURSE_ROWS[course][0].id;

    let rowOrder = [];
    let rowIndex = 0;

    let pool = [];
    let itemIndex = 0;

    let accepted = [];
    let progress = "";
    let target = "";

    let clearedRows = new Set();

    // ===========
    // Sound
    // ===========
    let audioCtx = null;
    function beep(freq=880, ms=110, type="sine", gain=0.06){
      try{
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const t0 = audioCtx.currentTime;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(gain, t0);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + ms/1000);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t0);
        o.stop(t0 + ms/1000);
      }catch(e){}
    }
    function clearRowSound(){
      beep(880,90,"sine",0.06);
      setTimeout(()=>beep(1108,90,"sine",0.06), 90);
      setTimeout(()=>beep(1320,120,"sine",0.06), 180);
    }

    // ===========
    // UI helpers
    // ===========
    function setHint(text){ els.hint.textContent = text; }

    function getRowLabel(course, rid){
      const r = COURSE_ROWS[course].find(x=>x.id===rid);
      return r ? r.label : rid;
    }

    function buildRowSelector(){
      const rows = COURSE_ROWS[course];
      els.rowSel.innerHTML = "";
      for(const r of rows){
        const opt = document.createElement("option");
        opt.value = r.id;
        opt.textContent = r.label;
        els.rowSel.appendChild(opt);
      }
      els.rowSel.value = rowId;
    }

    function buildRowBar(){
      els.rowbar.innerHTML = "";
      const rows = COURSE_ROWS[course];
      for(const r of rows){
        const chip = document.createElement("div");
        chip.className = "rowchip";
        chip.dataset.row = r.id;

        const star = document.createElement("div");
        star.className = "star" + (clearedRows.has(r.id) ? " cleared" : "");
        star.textContent = "★";

        const label = document.createElement("div");
        label.textContent = r.label;

        chip.appendChild(star);
        chip.appendChild(label);

        chip.addEventListener("click", ()=>{
          if(mode === "row"){
            rowId = r.id;
            els.rowSel.value = rowId;
            if(running) startRow(rowId);
            updateRowBarActive();
          }
        });

        els.rowbar.appendChild(chip);
      }
      updateRowBarActive();
    }

    function updateRowBarActive(){
      const chips = [...els.rowbar.querySelectorAll(".rowchip")];
      for(const c of chips){
        c.classList.toggle("active", c.dataset.row === rowId);
        const star = c.querySelector(".star");
        star.classList.toggle("cleared", clearedRows.has(c.dataset.row));
      }
    }

    // ===========
    // Core: choose target based on prefix (multiple romaji allowed)
    // ===========
    function pickTargetForPrefix(prefix){
      if(prefix.length === 0) return "";
      const candidates = accepted.filter(t => t.startsWith(prefix));
      if(candidates.length === 0) return "";
      candidates.sort((a,b)=>a.length-b.length);
      return candidates[0];
    }

    function currentExpectedChar(){
      if(target){
        return target[progress.length] || "";
      }
      const candidates = accepted.filter(t => t.startsWith(progress));
      if(candidates.length === 0) return "";
      const chars = new Set();
      for(const c of candidates){
        const ch = c[progress.length];
        if(ch) chars.add(ch);
      }
      if(chars.size === 1) return [...chars][0];
      return "";
    }

    function nextExpectedChar(){
      const ch = currentExpectedChar();
      if(!ch) return "";
      const p2 = progress + ch;

      if(target){
        return target[p2.length] || "";
      }

      const candidates = accepted.filter(t => t.startsWith(p2));
      if(candidates.length === 0) return "";
      const chars = new Set();
      for(const c of candidates){
        const c2 = c[p2.length];
        if(c2) chars.add(c2);
      }
      if(chars.size === 1) return [...chars][0];
      return "";
    }

    // ===========
    // Render: ROMAJI blocks (red=now blue=next, no finger text)
    // ===========
    function renderRomaji(){
      els.romaji.innerHTML = "";

      const guide = accepted.slice().sort((a,b)=>a.length-b.length)[0] || "";
      const letters = guide.toUpperCase().split("");

      for(let i=0;i<letters.length;i++){
        const div = document.createElement("div");
        div.className = "letter";
        div.textContent = letters[i];

        if(i < progress.length){
          div.classList.add("done");
        }else if(i === progress.length){
          div.classList.add("cur");
        }else if(i === progress.length + 1){
          div.classList.add("next");
        }
        els.romaji.appendChild(div);
      }
    }

    function clearKeyboardHighlights(){
      els.keysRoot.querySelectorAll(".key").forEach(k=>k.classList.remove("cur","next"));
    }

    function highlightKey(char, cls){
      if(!char) return;
      const k = char === " " ? " " : char.toLowerCase();
      const el = els.keysRoot.querySelector(`.key[data-k="${cssEscapeKey(k)}"]`);
      if(el) el.classList.add(cls);
    }

    function cssEscapeKey(k){
      // data-k is simple
      return k;
    }

    function clearFingerHighlights(){
      document.querySelectorAll(".finger").forEach(e=>{
        e.classList.remove("fingerNow","fingerNext");
      });
    }

    function updateFinger(nowKey, nextKey){
      clearFingerHighlights();

      const nowId = fingerMap[nowKey] || null;
      const nextId = fingerMap[nextKey] || null;

      if(nowId){
        const el = document.getElementById(nowId);
        if(el) el.classList.add("fingerNow");
      }
      if(nextId){
        const el = document.getElementById(nextId);
        if(el) el.classList.add("fingerNext");
      }
    }

    // IMPORTANT: always render "now=red" and "next=blue"
    // (no swapping animation; on correct we re-render after clearing once)
    function renderNowNext(){
      clearKeyboardHighlights();

      const nowChar = currentExpectedChar();
      const nextChar = nextExpectedChar();

      highlightKey(nowChar, "cur");   // red
      highlightKey(nextChar, "next"); // blue

      updateFinger(nowChar, nextChar);

      renderRomaji();
    }

    // ===========
    // Flow
    // ===========
    function setCourse(newCourse){
      course = newCourse;
      clearedRows = new Set();
      rowOrder = COURSE_ROWS[course].map(r=>r.id);
      rowIndex = 0;
      rowId = rowOrder[0];
      buildRowSelector();
      buildRowBar();
      hardResetView();
    }

    function setMode(newMode){
      mode = newMode;
      els.rowSel.style.display = (mode === "row") ? "" : "none";

      if(mode === "normal"){
        rowOrder = COURSE_ROWS[course].map(r=>r.id);
        rowIndex = 0;
        rowId = rowOrder[0];
      }else{
        rowId = els.rowSel.value || COURSE_ROWS[course][0].id;
      }
      buildRowBar();
      hardResetView();
    }

    function startGame(){
      running = true;
      setHint("いまは入力中（Enterはスタート専用）");

      if(mode === "normal"){
        rowIndex = 0;
        rowId = rowOrder[rowIndex];
      }else{
        rowId = els.rowSel.value || rowId;
      }
      startRow(rowId);
    }

    function startRow(rid){
      rowId = rid;
      updateRowBarActive();

      pool = ALL.filter(e => e.course === course && e.row === rowId);
      itemIndex = 0;
      nextItem(true);

      els.status.textContent = getRowLabel(course,rowId);
    }

    function nextItem(first=false){
      if(pool.length === 0){
        els.kana.textContent = "—";
        els.romaji.innerHTML = "";
        clearKeyboardHighlights();
        clearFingerHighlights();
        els.status.textContent = "この行の問題がありません";
        return;
      }

      if(!first) itemIndex++;

      if(itemIndex >= pool.length){
        // row cleared
        clearedRows.add(rowId);
        buildRowBar();
        updateRowBarActive();
        clearRowSound();

        if(mode === "normal"){
          rowIndex++;
          if(rowIndex >= rowOrder.length){
            running = false;
            setHint("Enterでスタート");
            els.status.textContent = "コース クリア！";
            return;
          }
          startRow(rowOrder[rowIndex]);
          return;
        }else{
          itemIndex = 0; // loop same row
        }
      }

      const cur = pool[itemIndex];
      els.kana.textContent = cur.kana;
      accepted = cur.accepts.slice();
      progress = "";
      target = "";

      renderNowNext();
    }

    // ===========
    // Input
    // ===========
    function normalizeKey(e){
      if(e.key === " ") return " ";
      const k = e.key.toLowerCase();
      if(k.length === 1 && k >= "a" && k <= "z") return k;
      return null;
    }

    function handleType(k){
      const nextPrefix = progress + k;
      const candidates = accepted.filter(t => t.startsWith(nextPrefix));
      if(candidates.length === 0){
        beep(220,70,"sine",0.03);
        return;
      }

      progress = nextPrefix;

      const picked = pickTargetForPrefix(progress);
      if(picked) target = picked;

      // Correct char sound (light)
      beep(660,55,"sine",0.04);

      // If finished any accepted romaji
      const isDone = accepted.some(t => t === progress);
      if(isDone){
        // To avoid "blue becomes red" feeling, clear once then re-render next item
        clearKeyboardHighlights();
        clearFingerHighlights();
        setTimeout(()=>nextItem(false), 35);
      }else{
        renderNowNext();
      }
    }

    // ===========
    // Reset / init view
    // ===========
    function hardResetView(){
      running = false;
      setHint("Enterでスタート");
      els.kana.textContent = "—";
      els.romaji.innerHTML = "";
      clearKeyboardHighlights();
      clearFingerHighlights();
      els.status.textContent = "";
      updateRowBarActive();
    }

    function resetAll(){
      clearedRows = new Set();
      buildRowBar();
      hardResetView();
    }

    // ===========
    // Events
    // ===========
    els.courseSel.addEventListener("change", ()=> setCourse(els.courseSel.value));
    els.modeSel.addEventListener("change", ()=> setMode(els.modeSel.value));

    els.rowSel.addEventListener("change", ()=>{
      rowId = els.rowSel.value;
      if(running && mode === "row") startRow(rowId);
      buildRowBar();
      updateRowBarActive();
    });

    els.resetBtn.addEventListener("click", resetAll);

    window.addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){
        e.preventDefault();
        if(!running) startGame();
        return;
      }
      if(!running) return;

      if(e.key === " ") e.preventDefault();

      const k = normalizeKey(e);
      if(!k) return;

      handleType(k);
    }, {passive:false});

    // ===========
    // Init
    // ===========
    (function init(){
      rowOrder = COURSE_ROWS[course].map(r=>r.id);
      rowId = rowOrder[0];
      buildRowSelector();
      buildRowBar();
      hardResetView();
    })();
  </script>
</body>
</html>
