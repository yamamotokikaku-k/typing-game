<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ローマ字タイピング（こども）</title>
  <style>
    :root{
      --bg:#ffffff;
      --fg:#111;
      --muted:#666;
      --line:#e8e8e8;

      --red:#ff3b30;
      --blue:#007aff;
      --ok:#2ecc71;

      --zone1:#ffe6e6; /* L pinky */
      --zone2:#fff2d9; /* L ring */
      --zone3:#fffbd9; /* L middle */
      --zone4:#e8f7ff; /* L index */
      --zone5:#e8fff1; /* R index */
      --zone6:#eef1ff; /* R middle */
      --zone7:#f3e8ff; /* R ring */
      --zone8:#ffe8f6; /* R pinky */
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
      background:var(--bg);
      color:var(--fg);
    }

    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 14px 18px;
    }

    /* Top controls (small) */
    .topbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
      padding-bottom:10px;
      border-bottom:1px solid var(--line);
    }
    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }
    select, button{
      font:inherit;
      border:1px solid var(--line);
      background:#fff;
      padding:8px 10px;
      border-radius:10px;
    }
    button{
      cursor:pointer;
      user-select:none;
    }
    button.primary{
      border-color:#d8d8d8;
    }
    .hint{
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    /* Main display */
    .stage{
      display:grid;
      gap:10px;
      margin-top:8px;
    }

    .kana{
      text-align:center;
      font-size:72px;
      line-height:1.05;
      font-weight:800;
      letter-spacing: 0.02em;
      margin: 6px 0 0;
    }
    @media (max-width:520px){
      .kana{font-size:56px}
    }

    .romaji{
      display:flex;
      justify-content:center;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin: 2px 0 0;
      min-height: 64px;
    }
    .letter{
      width: 52px;
      height: 52px;
      border-radius: 14px;
      border: 2px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:800;
      letter-spacing:0.02em;
      background:#fff;
    }
    .letter.cur{
      border-color: color-mix(in srgb, var(--red) 55%, #fff);
      background: color-mix(in srgb, var(--red) 12%, #fff);
      color: var(--red);
    }
    .letter.next{
      border-color: color-mix(in srgb, var(--blue) 55%, #fff);
      background: color-mix(in srgb, var(--blue) 10%, #fff);
      color: var(--blue);
    }
    .letter.done{
      border-color: color-mix(in srgb, var(--ok) 55%, #fff);
      background: color-mix(in srgb, var(--ok) 10%, #fff);
      color: var(--ok);
    }

    /* Finger signs */
    .fingers{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:2px;
      min-height: 44px;
    }
    .fingerCard{
      display:flex;
      align-items:center;
      gap:10px;
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px 10px;
      min-width: 210px;
      background:#fff;
    }
    .dot{
      width:14px;height:14px;border-radius:999px;
      flex:0 0 auto;
    }
    .dot.red{background:var(--red)}
    .dot.blue{background:var(--blue)}
    .fingerText{
      font-size:14px;
      font-weight:700;
    }
    .fingerSub{
      font-size:12px;
      color:var(--muted);
      margin-top:2px;
      font-weight:600;
    }
    .fingerCol{
      display:flex;
      flex-direction:column;
      line-height:1.15;
    }

    /* Row stars */
    .rowbar{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-top:6px;
      padding-top:10px;
      border-top:1px solid var(--line);
    }
    .rowchip{
      display:flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:6px 10px;
      background:#fff;
      font-size:12px;
      color:#222;
      user-select:none;
    }
    .star{
      font-size:14px;
      color:#bbb;
      line-height:1;
    }
    .star.cleared{color:#ffcc00}
    .rowchip.active{
      border-color:#cfcfcf;
      box-shadow: 0 0 0 2px #f3f3f3 inset;
      font-weight:800;
    }

    /* Keyboard */
    .kbdWrap{
      margin-top: 8px;
    }

    .kbd{
      position:relative;
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px 14px 12px;
      background:#fff;
      overflow:hidden;
    }

    /* Background finger zones (columns) */
    .zones{
      position:absolute;
      inset:0;
      display:grid;
      grid-template-columns: 1fr 1fr 1fr 1.35fr 1.35fr 1fr 1fr 1fr;
      opacity:0.55;
      pointer-events:none;
    }
    .z1{background:var(--zone1)}
    .z2{background:var(--zone2)}
    .z3{background:var(--zone3)}
    .z4{background:var(--zone4)}
    .z5{background:var(--zone5)}
    .z6{background:var(--zone6)}
    .z7{background:var(--zone7)}
    .z8{background:var(--zone8)}

    .keys{
      position:relative;
      display:flex;
      flex-direction:column;
      gap:8px;
    }
    .row{
      display:flex;
      justify-content:center;
      gap:6px;
      flex-wrap:nowrap;
    }
    .key{
      width: 46px;
      height: 46px;
      border-radius: 12px;
      border: 2px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      letter-spacing:0.02em;
      background:#fff;
      user-select:none;
      font-size:14px;
    }
    .key.wide{width: 74px}
    .key.space{width: 320px}
    @media (max-width:520px){
      .key{width: 38px; height: 42px; border-radius:10px}
      .key.wide{width: 62px}
      .key.space{width: 240px}
    }

    .key.cur{
      border-color: color-mix(in srgb, var(--red) 70%, #fff);
      background: color-mix(in srgb, var(--red) 12%, #fff);
      color: var(--red);
    }
    .key.next{
      border-color: color-mix(in srgb, var(--blue) 70%, #fff);
      background: color-mix(in srgb, var(--blue) 10%, #fff);
      color: var(--blue);
    }

    .status{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      margin-top:8px;
      line-height:1.35;
      min-height: 20px;
    }
    .status strong{color:#111}

    .tiny{
      font-size:12px;
      color:var(--muted);
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="topbar">
      <div class="controls">
        <select id="courseSel" aria-label="コース">
          <option value="basic">基本（あ〜わ）</option>
          <option value="dakuten">濁点</option>
          <option value="youon">拗音（きゃ等）</option>
          <option value="sokuon">促音（っ）</option>
        </select>

        <select id="modeSel" aria-label="モード">
          <option value="normal">通常モード（行を順番）</option>
          <option value="row">行練習モード（同じ行をくり返し）</option>
        </select>

        <select id="rowSel" aria-label="行" style="display:none"></select>

        <button id="resetBtn" class="primary" type="button">リセット</button>
      </div>

      <div class="hint" id="hint">Enterでスタート</div>
    </div>

    <div class="stage">
      <div class="kana" id="kana">—</div>

      <div class="romaji" id="romaji"></div>

      <div class="fingers" id="fingers"></div>

      <div class="rowbar" id="rowbar"></div>

      <div class="kbdWrap">
        <div class="kbd" id="kbd">
          <div class="zones" aria-hidden="true">
            <div class="z1"></div><div class="z2"></div><div class="z3"></div><div class="z4"></div>
            <div class="z5"></div><div class="z6"></div><div class="z7"></div><div class="z8"></div>
          </div>

          <div class="keys" id="keys">
            <div class="row">
              <div class="key wide" data-k="Tab">Tab</div>
              <div class="key" data-k="q">Q</div><div class="key" data-k="w">W</div><div class="key" data-k="e">E</div><div class="key" data-k="r">R</div><div class="key" data-k="t">T</div>
              <div class="key" data-k="y">Y</div><div class="key" data-k="u">U</div><div class="key" data-k="i">I</div><div class="key" data-k="o">O</div><div class="key" data-k="p">P</div>
              <div class="key wide" data-k="Backspace">⌫</div>
            </div>

            <div class="row">
              <div class="key wide" data-k="CapsLock">Caps</div>
              <div class="key" data-k="a">A</div><div class="key" data-k="s">S</div><div class="key" data-k="d">D</div><div class="key" data-k="f">F</div><div class="key" data-k="g">G</div>
              <div class="key" data-k="h">H</div><div class="key" data-k="j">J</div><div class="key" data-k="k">K</div><div class="key" data-k="l">L</div>
              <div class="key wide" data-k="Enter">Enter</div>
            </div>

            <div class="row">
              <div class="key wide" data-k="Shift">Shift</div>
              <div class="key" data-k="z">Z</div><div class="key" data-k="x">X</div><div class="key" data-k="c">C</div><div class="key" data-k="v">V</div><div class="key" data-k="b">B</div>
              <div class="key" data-k="n">N</div><div class="key" data-k="m">M</div>
              <div class="key wide" data-k="ShiftRight">Shift</div>
            </div>

            <div class="row">
              <div class="key space" data-k=" ">SPACE</div>
            </div>
          </div>
        </div>
        <div class="status" id="status"></div>
      </div>

      <div class="tiny" style="text-align:center;">
        訓令式ベース + 許可: SI/SHI, TI/CHI, TU/TSU, HU/FU など
      </div>
    </div>
  </div>

  <script>
    // ===========
    // Data
    // ===========

    // Row definitions per course (for stars / progression)
    const COURSE_ROWS = {
      basic: [
        {id:"a", label:"あ行"},
        {id:"ka", label:"か行"},
        {id:"sa", label:"さ行"},
        {id:"ta", label:"た行"},
        {id:"na", label:"な行"},
        {id:"ha", label:"は行"},
        {id:"ma", label:"ま行"},
        {id:"ya", label:"や行"},
        {id:"ra", label:"ら行"},
        {id:"wa", label:"わ行"},
      ],
      dakuten: [
        {id:"ga", label:"が行"},
        {id:"za", label:"ざ行"},
        {id:"da", label:"だ行"},
        {id:"ba", label:"ば行"},
        {id:"pa", label:"ぱ行"},
      ],
      youon: [
        {id:"kya", label:"きゃ行"},
        {id:"sya", label:"しゃ行"},
        {id:"tya", label:"ちゃ行"},
        {id:"nya", label:"にゃ行"},
        {id:"hya", label:"ひゃ行"},
        {id:"mya", label:"みゃ行"},
        {id:"rya", label:"りゃ行"},
        {id:"gya", label:"ぎゃ行"},
        {id:"bya", label:"びゃ行"},
        {id:"pya", label:"ぴゃ行"},
      ],
      sokuon: [
        {id:"k", label:"っk（か行）"},
        {id:"s", label:"っs（さ行）"},
        {id:"t", label:"っt（た行）"},
        {id:"p", label:"っp（ぱ行）"},
      ]
    };

    // Helpers to make entries
    function E(course, row, kana, accepts){
      return {course, row, kana, accepts: accepts.map(s=>s.toLowerCase())};
    }

    // Basic (gojūon) + variants
    const BASIC = [
      // あ行
      E("basic","a","あ",["a"]), E("basic","a","い",["i"]), E("basic","a","う",["u"]), E("basic","a","え",["e"]), E("basic","a","お",["o"]),
      // か行
      E("basic","ka","か",["ka"]), E("basic","ka","き",["ki"]), E("basic","ka","く",["ku"]), E("basic","ka","け",["ke"]), E("basic","ka","こ",["ko"]),
      // さ行
      E("basic","sa","さ",["sa"]), E("basic","sa","し",["si","shi"]), E("basic","sa","す",["su"]), E("basic","sa","せ",["se"]), E("basic","sa","そ",["so"]),
      // た行
      E("basic","ta","た",["ta"]), E("basic","ta","ち",["ti","chi"]), E("basic","ta","つ",["tu","tsu"]), E("basic","ta","て",["te"]), E("basic","ta","と",["to"]),
      // な行
      E("basic","na","な",["na"]), E("basic","na","に",["ni"]), E("basic","na","ぬ",["nu"]), E("basic","na","ね",["ne"]), E("basic","na","の",["no"]),
      // は行
      E("basic","ha","は",["ha"]), E("basic","ha","ひ",["hi"]), E("basic","ha","ふ",["hu","fu"]), E("basic","ha","へ",["he"]), E("basic","ha","ほ",["ho"]),
      // ま行
      E("basic","ma","ま",["ma"]), E("basic","ma","み",["mi"]), E("basic","ma","む",["mu"]), E("basic","ma","め",["me"]), E("basic","ma","も",["mo"]),
      // や行
      E("basic","ya","や",["ya"]), E("basic","ya","ゆ",["yu"]), E("basic","ya","よ",["yo"]),
      // ら行
      E("basic","ra","ら",["ra"]), E("basic","ra","り",["ri"]), E("basic","ra","る",["ru"]), E("basic","ra","れ",["re"]), E("basic","ra","ろ",["ro"]),
      // わ行 + ん
      E("basic","wa","わ",["wa"]), E("basic","wa","を",["wo","o"]), E("basic","wa","ん",["n","nn"]),
    ];

    // Dakuten / Handakuten
    const DAKUTEN = [
      // が行
      E("dakuten","ga","が",["ga"]), E("dakuten","ga","ぎ",["gi"]), E("dakuten","ga","ぐ",["gu"]), E("dakuten","ga","げ",["ge"]), E("dakuten","ga","ご",["go"]),
      // ざ行
      E("dakuten","za","ざ",["za"]), E("dakuten","za","じ",["zi","ji"]), E("dakuten","za","ず",["zu"]), E("dakuten","za","ぜ",["ze"]), E("dakuten","za","ぞ",["zo"]),
      // だ行（ぢ/づも許可）
      E("dakuten","da","だ",["da"]), E("dakuten","da","ぢ",["di","ji"]), E("dakuten","da","づ",["du","zu"]), E("dakuten","da","で",["de"]), E("dakuten","da","ど",["do"]),
      // ば行
      E("dakuten","ba","ば",["ba"]), E("dakuten","ba","び",["bi"]), E("dakuten","ba","ぶ",["bu"]), E("dakuten","ba","べ",["be"]), E("dakuten","ba","ぼ",["bo"]),
      // ぱ行
      E("dakuten","pa","ぱ",["pa"]), E("dakuten","pa","ぴ",["pi"]), E("dakuten","pa","ぷ",["pu"]), E("dakuten","pa","ぺ",["pe"]), E("dakuten","pa","ぽ",["po"]),
    ];

    // Youon (拗音)
    const YOUON = [
      // きゃ行
      E("youon","kya","きゃ",["kya"]), E("youon","kya","きゅ",["kyu"]), E("youon","kya","きょ",["kyo"]),
      // しゃ行（訓令: sya/ syu/ syo も許可）
      E("youon","sya","しゃ",["sya","sha"]), E("youon","sya","しゅ",["syu","shu"]), E("youon","sya","しょ",["syo","sho"]),
      // ちゃ行（訓令: tya/tyu/tyo + chi系も許可）
      E("youon","tya","ちゃ",["tya","cha"]), E("youon","tya","ちゅ",["tyu","chu"]), E("youon","tya","ちょ",["tyo","cho"]),
      // にゃ行
      E("youon","nya","にゃ",["nya"]), E("youon","nya","にゅ",["nyu"]), E("youon","nya","にょ",["nyo"]),
      // ひゃ行
      E("youon","hya","ひゃ",["hya"]), E("youon","hya","ひゅ",["hyu"]), E("youon","hya","ひょ",["hyo"]),
      // みゃ行
      E("youon","mya","みゃ",["mya"]), E("youon","mya","みゅ",["myu"]), E("youon","mya","みょ",["myo"]),
      // りゃ行
      E("youon","rya","りゃ",["rya"]), E("youon","rya","りゅ",["ryu"]), E("youon","rya","りょ",["ryo"]),
      // ぎゃ行
      E("youon","gya","ぎゃ",["gya"]), E("youon","gya","ぎゅ",["gyu"]), E("youon","gya","ぎょ",["gyo"]),
      // びゃ行
      E("youon","bya","びゃ",["bya"]), E("youon","bya","びゅ",["byu"]), E("youon","bya","びょ",["byo"]),
      // ぴゃ行
      E("youon","pya","ぴゃ",["pya"]), E("youon","pya","ぴゅ",["pyu"]), E("youon","pya","ぴょ",["pyo"]),
    ];

    // Sokuon (促音) - include common + variants
    const SOKUON = [
      // っk
      E("sokuon","k","っか",["kka"]), E("sokuon","k","っき",["kki"]), E("sokuon","k","っく",["kku"]), E("sokuon","k","っけ",["kke"]), E("sokuon","k","っこ",["kko"]),
      // っs (し is special)
      E("sokuon","s","っさ",["ssa"]), E("sokuon","s","っし",["ssi","sshi"]), E("sokuon","s","っす",["ssu"]), E("sokuon","s","っせ",["sse"]), E("sokuon","s","っそ",["sso"]),
      // っt (ち/つ special)
      E("sokuon","t","った",["tta"]),
      E("sokuon","t","っち",["tti","cchi"]),
      E("sokuon","t","っつ",["ttu","ttsu"]),
      E("sokuon","t","って",["tte"]),
      E("sokuon","t","っと",["tto"]),
      // っp
      E("sokuon","p","っぱ",["ppa"]), E("sokuon","p","っぴ",["ppi"]), E("sokuon","p","っぷ",["ppu"]), E("sokuon","p","っぺ",["ppe"]), E("sokuon","p","っぽ",["ppo"]),
    ];

    const ALL = [...BASIC, ...DAKUTEN, ...YOUON, ...SOKUON];

    // ===========
    // Finger mapping (zones + sign)
    // ===========
    const FINGER = {
      L_PINKY: {id:"L_PINKY", name:"左小指"},
      L_RING : {id:"L_RING",  name:"左薬指"},
      L_MIDDLE:{id:"L_MIDDLE",name:"左中指"},
      L_INDEX: {id:"L_INDEX", name:"左人差し指"},
      R_INDEX: {id:"R_INDEX", name:"右人差し指"},
      R_MIDDLE:{id:"R_MIDDLE",name:"右中指"},
      R_RING : {id:"R_RING",  name:"右薬指"},
      R_PINKY:{id:"R_PINKY", name:"右小指"},
      THUMB  : {id:"THUMB",   name:"親指"},
      NONE   : {id:"NONE",    name:"—"},
    };

    // Basic touch-typing finger assignment for keys we show.
    const KEY_TO_FINGER = {
      // Left hand
      "q":FINGER.L_PINKY, "a":FINGER.L_PINKY, "z":FINGER.L_PINKY,
      "w":FINGER.L_RING,  "s":FINGER.L_RING,  "x":FINGER.L_RING,
      "e":FINGER.L_MIDDLE,"d":FINGER.L_MIDDLE,"c":FINGER.L_MIDDLE,
      "r":FINGER.L_INDEX, "f":FINGER.L_INDEX, "v":FINGER.L_INDEX,
      "t":FINGER.L_INDEX, "g":FINGER.L_INDEX, "b":FINGER.L_INDEX,

      // Right hand
      "y":FINGER.R_INDEX, "h":FINGER.R_INDEX, "n":FINGER.R_INDEX,
      "u":FINGER.R_INDEX, "j":FINGER.R_INDEX, "m":FINGER.R_INDEX,
      "i":FINGER.R_MIDDLE,"k":FINGER.R_MIDDLE,
      "o":FINGER.R_RING,  "l":FINGER.R_RING,
      "p":FINGER.R_PINKY,

      " ":FINGER.THUMB
    };

    function fingerZoneId(f){
      // Map to 8 background zones (thumb shares index by default)
      switch(f.id){
        case "L_PINKY": return 1;
        case "L_RING": return 2;
        case "L_MIDDLE": return 3;
        case "L_INDEX": return 4;
        case "R_INDEX": return 5;
        case "R_MIDDLE": return 6;
        case "R_RING": return 7;
        case "R_PINKY": return 8;
        case "THUMB": return 5; // keep simple: space under right index zone
        default: return 4;
      }
    }

    // ===========
    // State
    // ===========
    const els = {
      courseSel: document.getElementById("courseSel"),
      modeSel: document.getElementById("modeSel"),
      rowSel: document.getElementById("rowSel"),
      resetBtn: document.getElementById("resetBtn"),
      hint: document.getElementById("hint"),
      kana: document.getElementById("kana"),
      romaji: document.getElementById("romaji"),
      fingers: document.getElementById("fingers"),
      rowbar: document.getElementById("rowbar"),
      status: document.getElementById("status"),
      keysRoot: document.getElementById("keys"),
      kbd: document.getElementById("kbd"),
    };

    let running = false;

    let course = "basic";
    let mode = "normal"; // normal | row
    let rowId = COURSE_ROWS[course][0].id;

    let rowOrder = [];
    let rowIndex = 0;

    let pool = [];          // entries for current row
    let itemIndex = 0;      // index in pool
    let accepted = [];      // accepted romaji strings for current kana
    let progress = "";      // typed so far
    let target = "";        // currently chosen target among accepted (dynamic)
    let clearedRows = new Set();

    // ===========
    // Sound (simple WebAudio)
    // ===========
    let audioCtx = null;
    function beep(freq=880, ms=110, type="sine", gain=0.06){
      try{
        if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const t0 = audioCtx.currentTime;
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = type;
        o.frequency.setValueAtTime(freq, t0);
        g.gain.setValueAtTime(gain, t0);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + ms/1000);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(t0);
        o.stop(t0 + ms/1000);
      }catch(e){}
    }
    function clearRowSound(){
      // short happy triad-ish
      beep(880,90,"sine",0.06);
      setTimeout(()=>beep(1108,90,"sine",0.06), 90);
      setTimeout(()=>beep(1320,120,"sine",0.06), 180);
    }

    // ===========
    // Build UI
    // ===========
    function buildRowSelector(){
      const rows = COURSE_ROWS[course];
      els.rowSel.innerHTML = "";
      for(const r of rows){
        const opt = document.createElement("option");
        opt.value = r.id;
        opt.textContent = r.label;
        els.rowSel.appendChild(opt);
      }
      els.rowSel.value = rowId;
    }

    function buildRowBar(){
      els.rowbar.innerHTML = "";
      const rows = COURSE_ROWS[course];
      for(const r of rows){
        const chip = document.createElement("div");
        chip.className = "rowchip";
        chip.dataset.row = r.id;

        const star = document.createElement("div");
        star.className = "star" + (clearedRows.has(r.id) ? " cleared" : "");
        star.textContent = "★";

        const label = document.createElement("div");
        label.textContent = r.label;

        chip.appendChild(star);
        chip.appendChild(label);

        chip.addEventListener("click", ()=>{
          // allow quick jump (simple)
          if(mode === "row"){
            rowId = r.id;
            els.rowSel.value = rowId;
            startRow(rowId, true);
          }
        });

        els.rowbar.appendChild(chip);
      }
      updateRowBarActive();
    }

    function updateRowBarActive(){
      const chips = [...els.rowbar.querySelectorAll(".rowchip")];
      for(const c of chips){
        c.classList.toggle("active", c.dataset.row === rowId);
        const star = c.querySelector(".star");
        star.classList.toggle("cleared", clearedRows.has(c.dataset.row));
      }
    }

    function setHint(text){
      els.hint.textContent = text;
    }

    // ===========
    // Game flow
    // ===========
    function setCourse(newCourse){
      course = newCourse;
      clearedRows = new Set();
      rowOrder = COURSE_ROWS[course].map(r=>r.id);
      rowIndex = 0;
      rowId = rowOrder[0];
      buildRowSelector();
      buildRowBar();
      hardResetView();
    }

    function setMode(newMode){
      mode = newMode;
      const showRow = (mode === "row");
      els.rowSel.style.display = showRow ? "" : "none";

      if(mode === "normal"){
        rowOrder = COURSE_ROWS[course].map(r=>r.id);
        rowIndex = 0;
        rowId = rowOrder[0];
      }else{
        rowId = els.rowSel.value || COURSE_ROWS[course][0].id;
      }
      buildRowBar();
      hardResetView();
    }

    function startGame(){
      running = true;
      setHint("いまは入力中（Enterはスタート専用）");
      if(mode === "normal"){
        rowIndex = 0;
        rowId = rowOrder[rowIndex];
        startRow(rowId, true);
      }else{
        rowId = els.rowSel.value || rowId;
        startRow(rowId, true);
      }
    }

    function startRow(rid, resetClear=false){
      if(resetClear){
        // keep clearedRows as is; only reset per-row progress
      }
      rowId = rid;
      updateRowBarActive();

      pool = ALL.filter(e => e.course === course && e.row === rowId);
      itemIndex = 0;
      nextItem(true);

      els.status.innerHTML = `<strong>${getRowLabel(course,rowId)}</strong> をれんしゅう`;
    }

    function getRowLabel(course, rid){
      const r = COURSE_ROWS[course].find(x=>x.id===rid);
      return r ? r.label : rid;
    }

    function nextItem(forceNew=false){
      if(pool.length === 0){
        els.kana.textContent = "—";
        els.romaji.innerHTML = "";
        els.fingers.innerHTML = "";
        els.status.textContent = "この行の問題がありません";
        return;
      }

      if(!forceNew){
        itemIndex++;
      }
      if(itemIndex >= pool.length){
        // Row cleared
        clearedRows.add(rowId);
        buildRowBar();
        updateRowBarActive();
        clearRowSound();

        if(mode === "normal"){
          rowIndex++;
          if(rowIndex >= rowOrder.length){
            running = false;
            setHint("Enterでスタート");
            els.status.innerHTML = `<strong>コース クリア！</strong> もういちど Enter`;
            // keep current display
            return;
          }
          startRow(rowOrder[rowIndex], true);
          return;
        }else{
          // row practice: loop same row
          itemIndex = 0;
        }
      }

      const cur = pool[itemIndex];
      els.kana.textContent = cur.kana;

      accepted = cur.accepts.slice();
      progress = "";
      target = ""; // decide dynamically as user types

      renderRomaji();
      renderFingerSigns();
      renderKeyboardHighlight();
    }

    // Decide which accepted romaji we are aiming for (based on typed prefix)
    function pickTargetForPrefix(prefix){
      if(prefix.length === 0) return ""; // none yet
      const candidates = accepted.filter(t => t.startsWith(prefix));
      if(candidates.length === 0) return "";
      // choose shortest (easiest)
      candidates.sort((a,b)=>a.length-b.length);
      return candidates[0];
    }

    function currentExpectedChar(){
      // if no target chosen yet, any first char from any accepted
      if(target){
        return target[progress.length] || "";
      }
      // gather possible next char for current progress among all accepted
      const candidates = accepted.filter(t => t.startsWith(progress));
      if(candidates.length === 0) return "";
      const chars = new Set();
      for(const c of candidates){
        const ch = c[progress.length];
        if(ch) chars.add(ch);
      }
      // If multiple, we highlight none on keyboard (still show finger if possible)
      if(chars.size === 1) return [...chars][0];
      return "";
    }

    function nextExpectedChar(){
      const ch = currentExpectedChar();
      if(!ch) return "";
      // next char after that, only if deterministic
      const p2 = progress + ch;
      const candidates = accepted.filter(t => t.startsWith(p2));
      if(candidates.length === 0) return "";
      if(target){
        return target[p2.length] || "";
      }
      const chars = new Set();
      for(const c of candidates){
        const c2 = c[p2.length];
        if(c2) chars.add(c2);
      }
      if(chars.size === 1) return [...chars][0];
      return "";
    }

    // ===========
    // Rendering
    // ===========
    function renderRomaji(){
      els.romaji.innerHTML = "";

      // Choose a display template: show the shortest accepted as "guide"
      const guide = accepted.slice().sort((a,b)=>a.length-b.length)[0] || "";
      const letters = guide.toUpperCase().split("");

      for(let i=0;i<letters.length;i++){
        const div = document.createElement("div");
        div.className = "letter";
        div.textContent = letters[i];

        if(i < progress.length){
          div.classList.add("done");
        }else if(i === progress.length){
          div.classList.add("cur");
        }else if(i === progress.length + 1){
          div.classList.add("next");
        }

        els.romaji.appendChild(div);
      }

      // If multiple romanizations, show small hint in status line (light)
      const uniq = [...new Set(accepted)].sort((a,b)=>a.length-b.length);
      if(uniq.length > 1){
        const shown = uniq.slice(0,4).map(s=>s.toUpperCase()).join(" / ");
        els.status.innerHTML = `<strong>${getRowLabel(course,rowId)}</strong>　（OK: ${shown}${uniq.length>4 ? " …" : ""}）`;
      }else{
        els.status.innerHTML = `<strong>${getRowLabel(course,rowId)}</strong>`;
      }
    }

    function renderFingerSigns(){
      els.fingers.innerHTML = "";

      const curChar = currentExpectedChar();
      const nextChar = nextExpectedChar();

      const curFinger = charToFinger(curChar);
      const nextFinger = charToFinger(nextChar);

      els.fingers.appendChild(fingerCard("赤", "いま押す", curChar, curFinger, "red"));
      els.fingers.appendChild(fingerCard("青", "つぎ", nextChar, nextFinger, "blue"));
    }

    function fingerCard(colorLabel, subtitle, ch, finger, dotClass){
      const card = document.createElement("div");
      card.className = "fingerCard";

      const dot = document.createElement("div");
      dot.className = "dot " + dotClass;

      const col = document.createElement("div");
      col.className = "fingerCol";

      const t1 = document.createElement("div");
      t1.className = "fingerText";
      const keyStr = (ch ? ch.toUpperCase() : "—");
      const fingerStr = (finger ? finger.name : "—");
      t1.textContent = `${keyStr} → ${fingerStr}`;

      const t2 = document.createElement("div");
      t2.className = "fingerSub";
      t2.textContent = `${colorLabel}：${subtitle}`;

      col.appendChild(t1);
      col.appendChild(t2);

      card.appendChild(dot);
      card.appendChild(col);
      return card;
    }

    function charToFinger(ch){
      if(!ch) return FINGER.NONE;
      if(ch === " ") return FINGER.THUMB;
      const f = KEY_TO_FINGER[ch.toLowerCase()];
      return f || FINGER.NONE;
    }

    function clearKeyboardHighlights(){
      const keys = els.keysRoot.querySelectorAll(".key");
      keys.forEach(k=>k.classList.remove("cur","next"));
    }

    function renderKeyboardHighlight(){
      clearKeyboardHighlights();

      const curChar = currentExpectedChar();
      const nextChar = nextExpectedChar();

      if(curChar){
        const el = els.keysRoot.querySelector(`.key[data-k="${cssEscapeKey(curChar)}"]`);
        if(el) el.classList.add("cur");
      }
      if(nextChar){
        const el2 = els.keysRoot.querySelector(`.key[data-k="${cssEscapeKey(nextChar)}"]`);
        if(el2) el2.classList.add("next");
      }

      // Also emphasize zone subtly by adding outline on keyboard (optional, keep simple)
      // (No extra elements; current key highlight is main)
    }

    function cssEscapeKey(k){
      // data-k is simple ("a".."z" or " ")
      if(k === " ") return " ";
      return k.toLowerCase();
    }

    function hardResetView(){
      running = false;
      setHint("Enterでスタート");
      els.kana.textContent = "—";
      els.romaji.innerHTML = "";
      els.fingers.innerHTML = "";
      els.status.textContent = "";
      clearKeyboardHighlights();
      updateRowBarActive();
    }

    function resetAll(){
      clearedRows = new Set();
      buildRowBar();
      hardResetView();
    }

    // ===========
    // Input handling
    // ===========
    function normalizeKey(e){
      // Only letters + space
      if(e.key === " "){ return " "; }
      const k = e.key.toLowerCase();
      if(k.length === 1 && k >= "a" && k <= "z") return k;
      return null;
    }

    function handleType(k){
      // Determine if k can be next, across accepted options
      const nextPrefix = progress + k;
      const candidates = accepted.filter(t => t.startsWith(nextPrefix));
      if(candidates.length === 0){
        // wrong (quiet; keep UI simple)
        beep(220,70,"sine",0.03);
        return;
      }

      progress = nextPrefix;

      // lock-in target if possible
      const picked = pickTargetForPrefix(progress);
      if(picked) target = picked;

      renderRomaji();
      renderFingerSigns();
      renderKeyboardHighlight();

      // if complete any accepted string => correct
      const isDone = accepted.some(t => t === progress);
      if(isDone){
        beep(660,70,"sine",0.045);
        // move on
        nextItem(false);
      }
    }

    // ===========
    // Events
    // ===========
    els.courseSel.addEventListener("change", ()=>{
      setCourse(els.courseSel.value);
    });

    els.modeSel.addEventListener("change", ()=>{
      setMode(els.modeSel.value);
    });

    els.rowSel.addEventListener("change", ()=>{
      rowId = els.rowSel.value;
      if(running && mode === "row"){
        startRow(rowId, true);
      }else{
        buildRowBar();
        updateRowBarActive();
      }
    });

    els.resetBtn.addEventListener("click", ()=>{
      resetAll();
    });

    window.addEventListener("keydown", (e)=>{
      // Enter starts (only when not running)
      if(e.key === "Enter"){
        e.preventDefault();
        if(!running){
          startGame();
        }
        return;
      }

      if(!running) return;

      // Prevent page scroll by space
      if(e.key === " "){
        e.preventDefault();
      }

      const k = normalizeKey(e);
      if(!k) return;

      handleType(k);
    }, {passive:false});

    // ===========
    // Init
    // ===========
    (function init(){
      rowOrder = COURSE_ROWS[course].map(r=>r.id);
      rowId = rowOrder[0];
      buildRowSelector();
      buildRowBar();
      hardResetView();
    })();
  </script>
</body>
</html>
