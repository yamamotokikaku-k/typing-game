<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>かなタイピング</title>
  <style>
    :root{
      --bg:#fff;
      --fg:#111;
      --muted:#777;
      --red:#ff3b30;
      --blue:#007aff;

      /* finger base tints (very light) */
      --f-lp:#ffe9e9;  /* left pinky */
      --f-lr:#fff2e0;  /* left ring */
      --f-lm:#fff9d6;  /* left middle */
      --f-li:#e9fff0;  /* left index */
      --f-ri:#e9f3ff;  /* right index */
      --f-rm:#efe9ff;  /* right middle */
      --f-rr:#ffe9fb;  /* right ring */
      --f-rp:#f2f2f2;  /* right pinky / specials */
      --f-th:#f7f7f7;  /* thumb */
    }

    html,body{height:100%;}
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
      overflow:hidden;
    }

    /* full-screen canvas (behind text, above background) */
    #fx {
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:1;
    }

    .wrap{
      position:relative;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      padding:28px 18px 22px;
      box-sizing:border-box;
      z-index:2; /* above canvas */
    }

    .top{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:12px;
      width:100%;
      max-width:920px;
    }

    #kana{
      font-size:min(22vw, 140px);
      line-height:1;
      font-weight:800;
      letter-spacing:0.02em;
      user-select:none;
      min-height:1em;
    }

    #romaji{
      font-size:min(10vw, 64px);
      line-height:1;
      font-weight:800;
      letter-spacing:0.06em;
      user-select:none;
      min-height:1em;
      display:flex;
      align-items:baseline;
      gap:12px;
    }

    .r-red{color:var(--red);}
    .r-blue{color:var(--blue);}

    /* subtle “pop” on correct */
    .pop {
      animation: pop 120ms ease-out;
    }
    @keyframes pop {
      0%{ transform:scale(1); }
      40%{ transform:scale(1.08); }
      100%{ transform:scale(1); }
    }

    /* keyboard */
    .kbd{
      width:min(980px, 100%);
      display:flex;
      flex-direction:column;
      gap:8px;
      user-select:none;
    }

    .row{
      display:flex;
      gap:8px;
      justify-content:center;
    }

    .key{
      height:52px;
      border-radius:12px;
      border:1px solid #e7e7e7;
      box-shadow: 0 1px 0 rgba(0,0,0,0.03);
      background:#fafafa;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      color:#222;
      position:relative;
      transform:translateZ(0);
      will-change:transform, box-shadow;
    }

    .key small{
      font-size:12px;
      opacity:0.95;
      letter-spacing:0.02em;
    }

    /* widths based on US layout proportions */
    .w-1{ width:52px; }         /* standard */
    .w-125{ width:66px; }       /* 1.25u */
    .w-15{ width:78px; }        /* 1.5u */
    .w-175{ width:92px; }       /* 1.75u */
    .w-2{ width:108px; }        /* 2u */
    .w-225{ width:122px; }      /* 2.25u */
    .w-275{ width:150px; }      /* 2.75u */
    .w-625{ width:340px; }      /* space */

    /* finger tints */
    .f-lp{ background:var(--f-lp); }
    .f-lr{ background:var(--f-lr); }
    .f-lm{ background:var(--f-lm); }
    .f-li{ background:var(--f-li); }
    .f-ri{ background:var(--f-ri); }
    .f-rm{ background:var(--f-rm); }
    .f-rr{ background:var(--f-rr); }
    .f-rp{ background:var(--f-rp); }
    .f-th{ background:var(--f-th); }

    /* key press visual */
    .pressed{
      transform: translateY(2px) scale(0.98);
      box-shadow: 0 0 0 rgba(0,0,0,0);
    }

    /* target highlights */
    .target-strong-red::after,
    .target-weak-red::after,
    .target-strong-blue::after,
    .target-weak-blue::after{
      content:"";
      position:absolute;
      inset:4px;
      border-radius:10px;
      pointer-events:none;
    }

    .target-strong-red::after{
      border:3px solid rgba(255,59,48,0.95);
      box-shadow: 0 0 18px rgba(255,59,48,0.35);
    }
    .target-weak-red::after{
      border:2px solid rgba(255,59,48,0.55);
      box-shadow: 0 0 10px rgba(255,59,48,0.18);
    }
    .target-strong-blue::after{
      border:3px solid rgba(0,122,255,0.95);
      box-shadow: 0 0 18px rgba(0,122,255,0.30);
    }
    .target-weak-blue::after{
      border:2px solid rgba(0,122,255,0.55);
      box-shadow: 0 0 10px rgba(0,122,255,0.15);
    }

    /* idle space pulse (no text) */
    .pulse{
      animation: pulse 900ms ease-in-out infinite;
    }
    @keyframes pulse{
      0%,100%{ box-shadow: 0 0 0 rgba(0,0,0,0); }
      50%{ box-shadow: 0 0 18px rgba(0,0,0,0.10); }
    }

    /* miss shake (key only) */
    .shake{
      animation: shake 120ms linear;
    }
    @keyframes shake{
      0%{ transform: translateX(0); }
      25%{ transform: translateX(-2px); }
      50%{ transform: translateX(2px); }
      75%{ transform: translateX(-2px); }
      100%{ transform: translateX(0); }
    }

    /* layout tightening on small screens */
    @media (max-width:560px){
      .key{ height:44px; border-radius:10px; }
      .w-1{ width:44px; }
      .w-125{ width:56px; }
      .w-15{ width:66px; }
      .w-175{ width:78px; }
      .w-2{ width:92px; }
      .w-225{ width:106px; }
      .w-275{ width:128px; }
      .w-625{ width:280px; }
      .row{ gap:6px; }
      .kbd{ gap:6px; }
    }
  </style>
</head>
<body>
  <canvas id="fx"></canvas>

  <div class="wrap">
    <div class="top">
      <div id="kana"></div>
      <div id="romaji"></div>
    </div>

    <div class="kbd" id="kbd"></div>
  </div>

<script>
(() => {
  /* -----------------------------
     50音（試作：分岐なし固定）
  ----------------------------- */
  const QUESTIONS = [
    {k:'あ', r:'A'}, {k:'い', r:'I'}, {k:'う', r:'U'}, {k:'え', r:'E'}, {k:'お', r:'O'},
    {k:'か', r:'KA'}, {k:'き', r:'KI'}, {k:'く', r:'KU'}, {k:'け', r:'KE'}, {k:'こ', r:'KO'},
    {k:'さ', r:'SA'}, {k:'し', r:'SHI'}, {k:'す', r:'SU'}, {k:'せ', r:'SE'}, {k:'そ', r:'SO'},
    {k:'た', r:'TA'}, {k:'ち', r:'CHI'}, {k:'つ', r:'TSU'}, {k:'て', r:'TE'}, {k:'と', r:'TO'},
    {k:'な', r:'NA'}, {k:'に', r:'NI'}, {k:'ぬ', r:'NU'}, {k:'ね', r:'NE'}, {k:'の', r:'NO'},
    {k:'は', r:'HA'}, {k:'ひ', r:'HI'}, {k:'ふ', r:'FU'}, {k:'へ', r:'HE'}, {k:'ほ', r:'HO'},
    {k:'ま', r:'MA'}, {k:'み', r:'MI'}, {k:'む', r:'MU'}, {k:'め', r:'ME'}, {k:'も', r:'MO'},
    {k:'や', r:'YA'}, {k:'ゆ', r:'YU'}, {k:'よ', r:'YO'},
    {k:'ら', r:'RA'}, {k:'り', r:'RI'}, {k:'る', r:'RU'}, {k:'れ', r:'RE'}, {k:'ろ', r:'RO'},
    {k:'わ', r:'WA'}, {k:'を', r:'WO'}, {k:'ん', r:'N'},
  ];

  /* -----------------------------
     US配列キーボード（見た目）
     （打鍵判定は letter / space のみ）
  ----------------------------- */
  const KBD_LAYOUT = [
    // row 1
    [
      ['`','w-1','f-lp'], ['1','w-1','f-lp'], ['2','w-1','f-lr'], ['3','w-1','f-lm'], ['4','w-1','f-li'],
      ['5','w-1','f-li'], ['6','w-1','f-ri'], ['7','w-1','f-ri'], ['8','w-1','f-rm'], ['9','w-1','f-rr'],
      ['0','w-1','f-rp'], ['-','w-1','f-rp'], ['=','w-1','f-rp'], ['⌫','w-2','f-rp','Backspace']
    ],
    // row 2
    [
      ['Tab','w-15','f-lp','Tab'], ['Q','w-1','f-lp'], ['W','w-1','f-lr'], ['E','w-1','f-lm'], ['R','w-1','f-li'],
      ['T','w-1','f-li'], ['Y','w-1','f-ri'], ['U','w-1','f-ri'], ['I','w-1','f-rm'], ['O','w-1','f-rr'],
      ['P','w-1','f-rp'], ['[','w-1','f-rp'], [']','w-1','f-rp'], ['\\','w-15','f-rp','Backslash']
    ],
    // row 3
    [
      ['Caps','w-175','f-lp','CapsLock'], ['A','w-1','f-lp'], ['S','w-1','f-lr'], ['D','w-1','f-lm'], ['F','w-1','f-li'],
      ['G','w-1','f-li'], ['H','w-1','f-ri'], ['J','w-1','f-ri'], ['K','w-1','f-rm'], ['L','w-1','f-rr'],
      [';','w-1','f-rp'], ["'","w-1","f-rp"], ['Enter','w-225','f-rp','Enter']
    ],
    // row 4
    [
      ['Shift','w-225','f-lp','ShiftLeft'], ['Z','w-1','f-lp'], ['X','w-1','f-lr'], ['C','w-1','f-lm'], ['V','w-1','f-li'],
      ['B','w-1','f-li'], ['N','w-1','f-ri'], ['M','w-1','f-ri'], [',','w-1','f-rm'], ['.','w-1','f-rr'],
      ['/','w-1','f-rp'], ['Shift','w-275','f-rp','ShiftRight']
    ],
    // row 5
    [
      ['Ctrl','w-125','f-rp','ControlLeft'], ['Win','w-125','f-rp','MetaLeft'], ['Alt','w-125','f-rp','AltLeft'],
      ['Space','w-625','f-th','Space'],
      ['Alt','w-125','f-rp','AltRight'], ['Win','w-125','f-rp','MetaRight'], ['Menu','w-125','f-rp','ContextMenu'], ['Ctrl','w-125','f-rp','ControlRight']
    ]
  ];

  const kbdEl = document.getElementById('kbd');

  /** key lookup by label (uppercase letters for A-Z) */
  const keyEls = new Map(); // keyLabel -> element
  function buildKeyboard(){
    kbdEl.innerHTML = '';
    for (const row of KBD_LAYOUT){
      const rowEl = document.createElement('div');
      rowEl.className = 'row';
      for (const item of row){
        const [label, w, finger, code] = item;
        const key = document.createElement('div');
        key.className = `key ${w} ${finger}`;
        key.dataset.label = label;
        if (code) key.dataset.code = code;
        const s = document.createElement('small');
        s.textContent = label;
        key.appendChild(s);
        rowEl.appendChild(key);

        // store for highlighting; letters use uppercase, space uses "Space"
        keyEls.set(label.toUpperCase(), key);
        if (label === 'Space') keyEls.set(' ', key);
      }
      kbdEl.appendChild(rowEl);
    }
  }

  buildKeyboard();

  /* -----------------------------
     ゲーム状態
  ----------------------------- */
  const kanaEl = document.getElementById('kana');
  const romajiEl = document.getElementById('romaji');

  let started = false;
  let idx = 0;                // question index (sequential)
  let pos = 0;                // position within romaji
  let combo = 0;              // continuous correct keystrokes (no misses)
  let lastCorrectAt = 0;      // timestamp
  let vowelStreak = 0;        // あいうえお連続クリア（問単位）
  let lastVowelAt = 0;

  const VOWEL_RUN = ['あ','い','う','え','お'];

  /* -----------------------------
     WebAudio: 自前効果音（ファイル不要）
  ----------------------------- */
  let audioCtx = null;
  function ensureAudio(){
    if (audioCtx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return;
    audioCtx = new AC();
  }

  function beep({freq=880, dur=0.06, type='sine', gain=0.08, bend=0, noise=false}){
    if (!audioCtx) return;
    const t0 = audioCtx.currentTime;
    const t1 = t0 + dur;

    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t1);

    let srcNode;

    if (noise){
      // very short noise burst
      const bufferSize = Math.max(1, Math.floor(audioCtx.sampleRate * dur));
      const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
      const data = buffer.getChannelData(0);
      for (let i=0;i<bufferSize;i++){
        data[i] = (Math.random()*2-1) * 0.6;
      }
      const n = audioCtx.createBufferSource();
      n.buffer = buffer;

      // simple filter to soften
      const f = audioCtx.createBiquadFilter();
      f.type = 'lowpass';
      f.frequency.setValueAtTime(900, t0);

      n.connect(f).connect(g);
      srcNode = n;
    } else {
      const o = audioCtx.createOscillator();
      o.type = type;
      o.frequency.setValueAtTime(freq, t0);
      if (bend !== 0){
        o.frequency.exponentialRampToValueAtTime(freq * (bend > 0 ? 1.25 : 0.75), t0 + dur);
      }
      o.connect(g);
      srcNode = o;
    }

    g.connect(audioCtx.destination);
    srcNode.start(t0);
    srcNode.stop(t1 + 0.02);
  }

  function sfxCorrect(power=1){
    // short bright “ping”
    const base = 740 + Math.min(8, power) * 35;
    beep({freq:base, dur:0.05, type:'triangle', gain:0.07});
  }

  function sfxMiss(){
    // soft “thud” + tiny noise
    beep({freq:180, dur:0.07, type:'sine', gain:0.08, bend:-1});
    beep({dur:0.05, gain:0.035, noise:true});
  }

  /* -----------------------------
     Canvas Fireworks
  ----------------------------- */
  const canvas = document.getElementById('fx');
  const ctx = canvas.getContext('2d');

  let W=0,H=0, DPR=1;
  function resize(){
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = canvas.width  = Math.floor(window.innerWidth * DPR);
    H = canvas.height = Math.floor(window.innerHeight * DPR);
    canvas.style.width  = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  window.addEventListener('resize', resize, {passive:true});
  resize();

  const particles = [];
  function spawnFirework({x, y, power=1, bursts=1}){
    const p = Math.max(1, Math.min(10, power));
    const count = Math.floor(16 + p * 10);
    const speed = (1.2 + p * 0.28) * DPR;
    const life  = 28 + p * 7;

    for (let b=0;b<bursts;b++){
      const jitter = (Math.random()*2-1) * 18 * DPR;
      const jitter2 = (Math.random()*2-1) * 12 * DPR;
      const bx = x + jitter;
      const by = y + jitter2;

      for (let i=0;i<count;i++){
        const a = (Math.PI*2) * (i / count) + (Math.random()*0.15);
        const v = speed * (0.45 + Math.random()*0.85);
        particles.push({
          x: bx, y: by,
          vx: Math.cos(a)*v,
          vy: Math.sin(a)*v,
          life: life * (0.75 + Math.random()*0.55),
          maxLife: life,
          // lightweight color drift: red/blue mix
          c: (Math.random() < 0.5) ? 'rgba(255,59,48,' : 'rgba(0,122,255,'
        });
      }
    }
  }

  function fxTick(){
    // fade (trail)
    ctx.fillStyle = 'rgba(255,255,255,0.20)';
    ctx.fillRect(0,0,W,H);

    const g = 0.055 * DPR; // gravity
    for (let i = particles.length-1; i>=0; i--){
      const p = particles[i];
      p.vy += g;
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.985;
      p.vy *= 0.985;
      p.life -= 1;

      const t = Math.max(0, p.life / p.maxLife);
      const alpha = 0.65 * t;
      ctx.fillStyle = p.c + alpha.toFixed(3) + ')';
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2.0 * DPR, 0, Math.PI*2);
      ctx.fill();

      if (p.life <= 0 || p.y > H + 40*DPR) particles.splice(i,1);
    }

    requestAnimationFrame(fxTick);
  }
  // start with a clean white
  ctx.fillStyle = '#fff'; ctx.fillRect(0,0,W,H);
  requestAnimationFrame(fxTick);

  function centerFirework(power, bursts=1){
    // behind kana area: slightly above screen center
    const x = W * 0.5;
    const y = H * 0.40;
    spawnFirework({x, y, power, bursts});
  }

  function barrageFinal(){
    // “ババババババン！”: rapid small bursts + final big
    const t0 = performance.now();
    const steps = 6;
    for (let i=0;i<steps;i++){
      setTimeout(() => centerFirework(4 + i, 1), i * 70);
      // small per-burst tick (very light)
      setTimeout(() => sfxCorrect(3 + i), i * 70);
    }
    setTimeout(() => {
      centerFirework(10, 3);
      // final “DON”
      beep({freq:140, dur:0.11, type:'sine', gain:0.11});
      beep({freq:260, dur:0.07, type:'triangle', gain:0.06});
    }, steps * 70 + 60);
  }

  /* -----------------------------
     UI update helpers
  ----------------------------- */
  function clearHighlights(){
    for (const el of keyEls.values()){
      el.classList.remove(
        'target-strong-red','target-weak-red','target-strong-blue','target-weak-blue',
        'pulse','shake'
      );
    }
  }

  function setIdleUI(){
    kanaEl.textContent = '';
    romajiEl.textContent = '';
    clearHighlights();
    const spaceKey = keyEls.get(' ');
    if (spaceKey) spaceKey.classList.add('pulse');
  }

  function setQuestionUI(){
    const q = QUESTIONS[idx];
    const r = q.r.toUpperCase();
    kanaEl.textContent = q.k;

    romajiEl.innerHTML = '';
    // first char red, rest blue (even 3 letters)
    const first = document.createElement('span');
    first.className = 'r-red';
    first.textContent = r[0] || '';
    romajiEl.appendChild(first);

    const rest = r.slice(1);
    if (rest.length){
      const second = document.createElement('span');
      second.className = 'r-blue';
      second.textContent = rest;
      romajiEl.appendChild(second);
    }

    // highlight keys
    clearHighlights();

    // show all needed keys weakly (first red, rest blue)
    const need = r.split('');
    need.forEach((ch, i) => {
      const k = keyEls.get(ch);
      if (!k) return;
      if (i === 0) k.classList.add('target-weak-red');
      else k.classList.add('target-weak-blue');
    });

    // current target strongly
    const current = need[pos] || '';
    const kcur = keyEls.get(current);
    if (kcur){
      if (pos === 0) kcur.classList.remove('target-weak-red');
      else kcur.classList.remove('target-weak-blue');

      if (pos === 0) kcur.classList.add('target-strong-red');
      else kcur.classList.add('target-strong-blue');
    }
  }

  function pop(el){
    el.classList.remove('pop');
    // force reflow
    void el.offsetWidth;
    el.classList.add('pop');
  }

  function pressVisual(keyEl){
    if (!keyEl) return;
    keyEl.classList.add('pressed');
    setTimeout(() => keyEl.classList.remove('pressed'), 70);
  }

  function shakeKey(keyEl){
    if (!keyEl) return;
    keyEl.classList.remove('shake');
    void keyEl.offsetWidth;
    keyEl.classList.add('shake');
    setTimeout(() => keyEl.classList.remove('shake'), 140);
  }

  /* -----------------------------
     Start / Progress
  ----------------------------- */
  function startGame(){
    started = true;
    idx = 0;
    pos = 0;
    combo = 0;
    vowelStreak = 0;
    lastCorrectAt = 0;
    lastVowelAt = 0;
    setQuestionUI();
  }

  function advanceQuestion(){
    idx = (idx + 1) % QUESTIONS.length;
    pos = 0;
    setQuestionUI();
  }

  function handleCorrectKeystroke(){
    const now = performance.now();
    const dt = lastCorrectAt ? (now - lastCorrectAt) : 9999;
    lastCorrectAt = now;

    // speed bonus: fast chaining feels better
    if (dt < 350) combo += 2;
    else combo += 1;

    // firework power grows with combo but capped
    const power = Math.max(1, Math.min(10, Math.floor(combo / 2)));

    sfxCorrect(power);
    pop(romajiEl);

    // visual reward per correct keystroke: small, keep UI clean
    if (pos > 0) centerFirework(Math.max(1, Math.min(6, power)), 1);

    // move position
    pos++;

    const r = QUESTIONS[idx].r.toUpperCase();
    if (pos >= r.length){
      // question cleared -> bigger reward
      const qKana = QUESTIONS[idx].k;

      // vowel run ladder: あいうえお を「問」で連続クリアしたら最後ババババババン！
      const expectedVowel = VOWEL_RUN[vowelStreak] || null;
      const dtV = lastVowelAt ? (now - lastVowelAt) : 9999;

      if (qKana === expectedVowel && dtV < 2000){
        vowelStreak++;
      } else if (qKana === VOWEL_RUN[0]) {
        vowelStreak = 1;
      } else {
        vowelStreak = 0;
      }
      lastVowelAt = now;

      // scale up per question clear
      centerFirework(Math.max(2, Math.min(9, power + 2)), 2);

      if (vowelStreak >= 5){
        vowelStreak = 0;
        barrageFinal();
      }

      advanceQuestion();
      return;
    }

    setQuestionUI();
  }

  function handleMissKeystroke(keyEl){
    combo = 0;
    vowelStreak = 0;
    sfxMiss();
    shakeKey(keyEl);
    if (navigator.vibrate) navigator.vibrate(20);

    // slight “look here” strengthening: re-apply current highlight
    setQuestionUI();
  }

  /* -----------------------------
     Key handling (no input box)
  ----------------------------- */
  function normalizeKey(ev){
    // letters: a-z -> A-Z
    if (ev.key && ev.key.length === 1){
      const ch = ev.key;
      if (/[a-z]/i.test(ch)) return ch.toUpperCase();
      if (ch === ' ') return ' ';
    }
    if (ev.code === 'Space') return ' ';
    return null;
  }

  function onKeyDown(ev){
    const k = normalizeKey(ev);
    if (!k) return;

    // prevent page scroll on space
    if (k === ' ') ev.preventDefault();

    // visual press if we have that key
    const keyEl = (k === ' ') ? keyEls.get(' ') : keyEls.get(k);
    pressVisual(keyEl);

    if (!started){
      if (k === ' '){
        ensureAudio();
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        // tiny “start” tick (no text)
        beep({freq:520, dur:0.05, type:'triangle', gain:0.06});
        clearHighlights();
        startGame();
      }
      return;
    }

    const r = QUESTIONS[idx].r.toUpperCase();
    const expected = r[pos] || '';

    if (k === expected){
      handleCorrectKeystroke();
    } else {
      handleMissKeystroke(keyEl);
    }
  }

  window.addEventListener('keydown', onKeyDown, {passive:false});

  /* -----------------------------
     Initial UI (no text)
  ----------------------------- */
  setIdleUI();

})();
</script>
</body>
</html>
