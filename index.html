<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>５０音タイピング</title>
  <style>
    :root{
      --bg:#ffffff;
      --fg:#111;
      --muted:#6b7280;
      --line:#e5e7eb;

      --red:#ef4444;
      --blue:#3b82f6;

      /* finger zone colors (soft) */
      --lp:#fde2e2; /* left pinky */
      --lr:#fff1cc; /* left ring */
      --lm:#e7f7d8; /* left middle */
      --li:#d7f5f0; /* left index */
      --ri:#dbeafe; /* right index */
      --rm:#e9d5ff; /* right middle */
      --rr:#ffe4f1; /* right ring */
      --rp:#ffe7d6; /* right pinky */
      --th:#e5e7eb; /* thumbs */
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--bg);
      color:var(--fg);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Yu Gothic", sans-serif;
      overflow:hidden;
    }

    /* fireworks canvas */
    #fx{
      position:fixed; inset:0;
      pointer-events:none;
    }

    .wrap{
      height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      padding:18px 14px 14px;
      gap:10px;
    }

    .top{
      width:min(900px, 100%);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      padding:6px 0 0;
    }
    .pillbar{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:center;
    }
    .pill{
      border:1px solid var(--line);
      background:#fff;
      color:#111;
      padding:10px 12px;
      border-radius:999px;
      font-size:14px;
      line-height:1;
      cursor:pointer;
      user-select:none;
    }
    .pill[aria-pressed="true"]{
      border-color:#111;
    }

    .center{
      width:min(900px, 100%);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      margin-top:6px;
      flex:1;
      min-height:0;
    }

    .kana{
      font-size:120px;
      font-weight:800;
      letter-spacing:0.02em;
      line-height:1;
      text-align:center;
      margin:0;
    }

    .roma{
      display:flex;
      align-items:baseline;
      justify-content:center;
      gap:10px;
      font-weight:800;
      font-size:46px;
      letter-spacing:0.06em;
      line-height:1.1;
      user-select:none;
      min-height:56px;
    }
    .roma .c{
      display:inline-block;
      padding:2px 10px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#fff;
    }
    .roma .c.red{ border-color: color-mix(in srgb, var(--red) 55%, #fff); }
    .roma .c.blue{ border-color: color-mix(in srgb, var(--blue) 55%, #fff); }
    .roma .c.red{ color:var(--red); }
    .roma .c.blue{ color:var(--blue); }
    .roma .rest{
      color:var(--muted);
      font-size:28px;
      letter-spacing:0.08em;
      padding-left:6px;
      transform: translateY(-4px);
      max-width: min(520px, 90vw);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .status{
      height:18px;
      font-size:14px;
      color:var(--muted);
      user-select:none;
    }
    .status .k{
      color:#111;
      font-weight:700;
    }

    /* keyboard */
    .kbwrap{
      width:min(980px, 100%);
      border-top:1px solid var(--line);
      padding-top:12px;
    }
    .keyboard{
      width:100%;
      display:flex;
      flex-direction:column;
      gap:7px;
      align-items:center;
      justify-content:center;
      user-select:none;
    }
    .row{
      width:100%;
      display:flex;
      gap:6px;
      justify-content:center;
    }
    .key{
      height:46px;
      border-radius:10px;
      border:1px solid var(--line);
      background:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      font-size:13px;
      color:#111;
      position:relative;
      min-width:42px;
      flex: 0 0 auto;
      box-shadow: 0 1px 0 rgba(0,0,0,0.03);
    }
    .key.small{ font-size:12px; }
    .key.w1{ width:42px; }
    .key.w15{ width:62px; }
    .key.w2{ width:82px; }
    .key.w25{ width:102px; }
    .key.w3{ width:122px; }
    .key.w35{ width:142px; }
    .key.w6{ width:320px; }

    /* finger zone tint */
    .f-lp{ background:var(--lp); }
    .f-lr{ background:var(--lr); }
    .f-lm{ background:var(--lm); }
    .f-li{ background:var(--li); }
    .f-ri{ background:var(--ri); }
    .f-rm{ background:var(--rm); }
    .f-rr{ background:var(--rr); }
    .f-rp{ background:var(--rp); }
    .f-th{ background:var(--th); }

    /* target highlight (does not change base color) */
    .key.hl-red::after,
    .key.hl-blue::after{
      content:"";
      position:absolute; inset:3px;
      border-radius:8px;
      border:3px solid transparent;
      pointer-events:none;
    }
    .key.hl-red::after{ border-color:var(--red); }
    .key.hl-blue::after{ border-color:var(--blue); }

    /* pressed flash */
    .key.pressed{
      transform: translateY(1px);
      filter: brightness(0.97);
    }

    /* shake on miss */
    .shake{
      animation: shake 180ms linear;
    }
    @keyframes shake{
      0%{ transform: translateX(0); }
      25%{ transform: translateX(-6px); }
      50%{ transform: translateX(6px); }
      75%{ transform: translateX(-4px); }
      100%{ transform: translateX(0); }
    }

    @media (max-width: 520px){
      .kana{ font-size:92px; }
      .roma{ font-size:38px; }
      .key{ height:42px; min-width:36px; border-radius:9px; }
      .key.w6{ width:260px; }
    }
  </style>
</head>
<body>
  <canvas id="fx"></canvas>

  <div class="wrap">
    <div class="top">
      <div class="pillbar" id="modes"></div>
    </div>

    <main class="center">
      <h1 class="kana" id="kana">—</h1>

      <div class="roma" id="roma">
        <span class="c red" id="r1">—</span>
        <span class="c blue" id="r2">—</span>
        <span class="rest" id="rrest"></span>
      </div>

      <div class="status" id="status"><span class="k">Space</span></div>
    </main>

    <div class="kbwrap">
      <div class="keyboard" id="keyboard"></div>
    </div>
  </div>

<script>
(() => {
  /* ---------------------------
     Kana → Romaji (common variants)
     --------------------------- */
  const GOJUON = [
    { row:"通し", key:"all", items:[
      ["あ",["a"]], ["い",["i"]], ["う",["u"]], ["え",["e"]], ["お",["o"]],
      ["か",["ka"]],["き",["ki"]],["く",["ku"]],["け",["ke"]],["こ",["ko"]],
      ["さ",["sa"]],["し",["shi","si"]],["す",["su"]],["せ",["se"]],["そ",["so"]],
      ["た",["ta"]],["ち",["chi","ti"]],["つ",["tsu","tu"]],["て",["te"]],["と",["to"]],
      ["な",["na"]],["に",["ni"]],["ぬ",["nu"]],["ね",["ne"]],["の",["no"]],
      ["は",["ha"]],["ひ",["hi"]],["ふ",["fu","hu"]],["へ",["he"]],["ほ",["ho"]],
      ["ま",["ma"]],["み",["mi"]],["む",["mu"]],["め",["me"]],["も",["mo"]],
      ["や",["ya"]],["ゆ",["yu"]],["よ",["yo"]],
      ["ら",["ra"]],["り",["ri"]],["る",["ru"]],["れ",["re"]],["ろ",["ro"]],
      ["わ",["wa"]],["を",["wo","o"]],["ん",["n","nn"]]
    ]},
    { row:"あ", key:"a", items:[["あ",["a"]],["い",["i"]],["う",["u"]],["え",["e"]],["お",["o"]]] },
    { row:"か", key:"ka", items:[["か",["ka"]],["き",["ki"]],["く",["ku"]],["け",["ke"]],["こ",["ko"]]] },
    { row:"さ", key:"sa", items:[["さ",["sa"]],["し",["shi","si"]],["す",["su"]],["せ",["se"]],["そ",["so"]]] },
    { row:"た", key:"ta", items:[["た",["ta"]],["ち",["chi","ti"]],["つ",["tsu","tu"]],["て",["te"]],["と",["to"]]] },
    { row:"な", key:"na", items:[["な",["na"]],["に",["ni"]],["ぬ",["nu"]],["ね",["ne"]],["の",["no"]]] },
    { row:"は", key:"ha", items:[["は",["ha"]],["ひ",["hi"]],["ふ",["fu","hu"]],["へ",["he"]],["ほ",["ho"]]] },
    { row:"ま", key:"ma", items:[["ま",["ma"]],["み",["mi"]],["む",["mu"]],["め",["me"]],["も",["mo"]]] },
    { row:"や", key:"ya", items:[["や",["ya"]],["ゆ",["yu"]],["よ",["yo"]]] },
    { row:"ら", key:"ra", items:[["ら",["ra"]],["り",["ri"]],["る",["ru"]],["れ",["re"]],["ろ",["ro"]]] },
    { row:"わ", key:"wa", items:[["わ",["wa"]],["を",["wo","o"]],["ん",["n","nn"]]] },
  ];

  /* ---------------------------
     State
     --------------------------- */
  const elKana = document.getElementById("kana");
  const elR1 = document.getElementById("r1");
  const elR2 = document.getElementById("r2");
  const elRrest = document.getElementById("rrest");
  const elStatus = document.getElementById("status");
  const elR = document.getElementById("roma");

  let modeKey = "all";
  let started = false;
  let list = [];
  let idx = 0;

  let target = "";        // current accepted target string (one of variants)
  let variants = [];      // all variants for current kana
  let typed = "";
  let streak = 0;

  /* ---------------------------
     Audio (reliable: WebAudio)
     --------------------------- */
  let AC = null;
  let audioReady = false;

  function ensureAudio(){
    if(!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
    if(AC.state !== "running") AC.resume();
    audioReady = true;
  }

  function beep({t=0, f=440, dur=0.08, type="sine", gain=0.08}){
    if(!AC) return;
    const now = AC.currentTime;
    const o = AC.createOscillator();
    const g = AC.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f, now + t);
    g.gain.setValueAtTime(0.0001, now + t);
    g.gain.exponentialRampToValueAtTime(gain, now + t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, now + t + dur);

    o.connect(g).connect(AC.destination);
    o.start(now + t);
    o.stop(now + t + dur + 0.02);
  }

  function fanfare(power=1){
    if(!audioReady) return;
    // light, short, not sharp
    const base = 440;
    const s = Math.min(1.8, 1 + power*0.12);
    const notes = [
      {t:0.00, f:base*1.00},
      {t:0.06, f:base*1.26},
      {t:0.12, f:base*1.50},
      {t:0.18, f:base*2.00},
    ];
    for(const n of notes){
      beep({t:n.t, f:n.f*s, dur:0.10, type:"triangle", gain:0.06});
    }
    // tiny sparkle
    if(power >= 4) beep({t:0.09, f:base*3.00*s, dur:0.06, type:"sine", gain:0.03});
  }

  function missSound(){
    if(!audioReady) return;
    beep({t:0, f:180, dur:0.09, type:"square", gain:0.04});
  }

  /* ---------------------------
     Fireworks (canvas particles)
     --------------------------- */
  const canvas = document.getElementById("fx");
  const ctx = canvas.getContext("2d");
  const P = [];
  function resize(){
    canvas.width = Math.floor(window.innerWidth * devicePixelRatio);
    canvas.height = Math.floor(window.innerHeight * devicePixelRatio);
  }
  window.addEventListener("resize", resize);
  resize();

  function burst(x, y, strength=1){
    const count = Math.floor(26 + strength*10);
    for(let i=0;i<count;i++){
      const a = Math.random()*Math.PI*2;
      const sp = (2.0 + Math.random()*3.0) * (0.9 + strength*0.12);
      P.push({
        x, y,
        vx: Math.cos(a)*sp,
        vy: Math.sin(a)*sp,
        life: 1,
        size: (2 + Math.random()*2) * (0.9 + strength*0.10),
        // fixed bright-ish without setting a specific palette: use HSL hue
        h: Math.floor(Math.random()*360)
      });
    }
  }

  function tick(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // fade
    for(let i=P.length-1;i>=0;i--){
      const p = P[i];
      p.vy += 0.05;
      p.x += p.vx;
      p.y += p.vy;
      p.life -= 0.02;

      if(p.life <= 0){
        P.splice(i,1);
        continue;
      }

      const alpha = Math.max(0, p.life);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = `hsl(${p.h} 90% 55%)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    requestAnimationFrame(tick);
  }
  tick();

  function fireworkAtCenter(power=1){
    const x = canvas.width*0.5;
    const y = canvas.height*0.35;
    burst(x, y, power);
  }

  /* ---------------------------
     Mode buttons
     --------------------------- */
  const elModes = document.getElementById("modes");
  const modeButtons = [];

  function setMode(key){
    modeKey = key;
    for(const b of modeButtons){
      b.setAttribute("aria-pressed", b.dataset.key === key ? "true" : "false");
    }
    resetRound();
  }

  function buildModes(){
    // show: 通し + あ〜わ
    const order = ["all","a","ka","sa","ta","na","ha","ma","ya","ra","wa"];
    for(const k of order){
      const m = GOJUON.find(x => x.key === k);
      const b = document.createElement("button");
      b.className = "pill";
      b.type = "button";
      b.textContent = (k === "all") ? "通し" : (m.row + "行");
      b.dataset.key = k;
      b.setAttribute("aria-pressed", k === modeKey ? "true" : "false");
      b.addEventListener("click", () => setMode(k));
      elModes.appendChild(b);
      modeButtons.push(b);
    }
  }
  buildModes();

  /* ---------------------------
     Questions
     --------------------------- */
  function getItemsForMode(key){
    const m = GOJUON.find(x => x.key === key);
    return m ? m.items.slice() : GOJUON[0].items.slice();
  }

  function chooseTargetFromVariants(vs){
    // default: first variant (standard), accept any
    return vs[0];
  }

  function nextQuestion(){
    if(!list.length) list = getItemsForMode(modeKey);
    idx = (idx + 1) % list.length;

    // 通しは最後まで行ったら結果表示せず、最初に戻ってもいいが
    // 要望は「50音連続で出題」なので、通しはループさせる。
    loadQuestion(list[idx]);
  }

  function loadQuestion(pair){
    const [k, vs] = pair;
    elKana.textContent = k;
    variants = vs.map(s => s.toLowerCase());
    target = chooseTargetFromVariants(variants);
    typed = "";
    renderRoma();
    updateHighlights();
  }

  function resetRound(){
    started = false;
    streak = 0;
    list = getItemsForMode(modeKey);
    idx = 0;
    loadQuestion(list[idx]);
    setStatusIdle();
    updateHighlights();
  }

  function setStatusIdle(){
    elStatus.innerHTML = `<span class="k">Space</span>`;
  }

  function setStatusPlaying(){
    elStatus.textContent = "";
  }

  function setStatusCorrect(){
    elStatus.textContent = "";
  }

  /* ---------------------------
     Romaji UI: show next 2 chars in red/blue, rest gray
     --------------------------- */
  function renderRoma(){
    const remaining = target.slice(typed.length);
    const c1 = remaining[0] ? remaining[0].toUpperCase() : "—";
    const c2 = remaining[1] ? remaining[1].toUpperCase() : "—";
    elR1.textContent = c1;
    elR2.textContent = c2;
    elRrest.textContent = remaining.length > 2 ? remaining.slice(2).toUpperCase() : "";
  }

  function shake(){
    elR.classList.remove("shake");
    // reflow
    void elR.offsetWidth;
    elR.classList.add("shake");
  }

  /* ---------------------------
     Keyboard (US layout)
     --------------------------- */
  const KEY_ROWS = [
    [
      k("`","Backquote","w1","f-lp"),
      k("1","Digit1","w1","f-lp"),
      k("2","Digit2","w1","f-lr"),
      k("3","Digit3","w1","f-lm"),
      k("4","Digit4","w1","f-li"),
      k("5","Digit5","w1","f-li"),
      k("6","Digit6","w1","f-ri"),
      k("7","Digit7","w1","f-ri"),
      k("8","Digit8","w1","f-rm"),
      k("9","Digit9","w1","f-rr"),
      k("0","Digit0","w1","f-rp"),
      k("-","Minus","w1","f-rp"),
      k("=","Equal","w1","f-rp"),
      k("⌫","Backspace","w2 small","f-rp"),
    ],
    [
      k("Tab","Tab","w15 small","f-lp"),
      k("Q","KeyQ","w1","f-lp"),
      k("W","KeyW","w1","f-lr"),
      k("E","KeyE","w1","f-lm"),
      k("R","KeyR","w1","f-li"),
      k("T","KeyT","w1","f-li"),
      k("Y","KeyY","w1","f-ri"),
      k("U","KeyU","w1","f-ri"),
      k("I","KeyI","w1","f-rm"),
      k("O","KeyO","w1","f-rr"),
      k("P","KeyP","w1","f-rp"),
      k("[","BracketLeft","w1","f-rp"),
      k("]","BracketRight","w1","f-rp"),
      k("\\","Backslash","w15","f-rp"),
    ],
    [
      k("Caps","CapsLock","w2 small","f-lp"),
      k("A","KeyA","w1","f-lp"),
      k("S","KeyS","w1","f-lr"),
      k("D","KeyD","w1","f-lm"),
      k("F","KeyF","w1","f-li"),
      k("G","KeyG","w1","f-li"),
      k("H","KeyH","w1","f-ri"),
      k("J","KeyJ","w1","f-ri"),
      k("K","KeyK","w1","f-rm"),
      k("L","KeyL","w1","f-rr"),
      k(";","Semicolon","w1","f-rp"),
      k("'","Quote","w1","f-rp"),
      k("Enter","Enter","w25 small","f-rp"),
    ],
    [
      k("Shift","ShiftLeft","w25 small","f-lp"),
      k("Z","KeyZ","w1","f-lp"),
      k("X","KeyX","w1","f-lr"),
      k("C","KeyC","w1","f-lm"),
      k("V","KeyV","w1","f-li"),
      k("B","KeyB","w1","f-li"),
      k("N","KeyN","w1","f-ri"),
      k("M","KeyM","w1","f-ri"),
      k(",","Comma","w1","f-rm"),
      k(".","Period","w1","f-rr"),
      k("/","Slash","w1","f-rp"),
      k("Shift","ShiftRight","w3 small","f-rp"),
    ],
    [
      k("Ctrl","ControlLeft","w15 small","f-lp"),
      k("⌘","MetaLeft","w15 small","f-lp"),
      k("Alt","AltLeft","w15 small","f-li"),
      k("Space","Space","w6","f-th"),
      k("Alt","AltRight","w15 small","f-ri"),
      k("⌘","MetaRight","w15 small","f-rp"),
      k("Ctrl","ControlRight","w15 small","f-rp"),
    ]
  ];

  const keyElsByCode = new Map();

  function k(label, code, wClass, fingerClass){
    return {label, code, wClass, fingerClass};
  }

  function buildKeyboard(){
    const root = document.getElementById("keyboard");
    root.innerHTML = "";
    for(const row of KEY_ROWS){
      const r = document.createElement("div");
      r.className = "row";
      for(const key of row){
        const d = document.createElement("div");
        d.className = `key ${key.wClass} ${key.fingerClass}`;
        d.textContent = key.label;
        d.dataset.code = key.code;
        r.appendChild(d);
        keyElsByCode.set(key.code, d);
      }
      root.appendChild(r);
    }
  }
  buildKeyboard();

  function clearHighlights(){
    for(const el of keyElsByCode.values()){
      el.classList.remove("hl-red","hl-blue");
    }
  }

  function codeForChar(ch){
    const c = ch.toLowerCase();
    if(c >= "a" && c <= "z") return "Key" + c.toUpperCase();
    if(c >= "0" && c <= "9") return "Digit" + c;
    const map = {
      "-":"Minus","=":"Equal","[":"BracketLeft","]":"BracketRight","\\":"Backslash",
      ";":"Semicolon","'":"Quote",",":"Comma",".":"Period","/":"Slash","`":"Backquote"
    };
    return map[c] || null;
  }

  function updateHighlights(){
    clearHighlights();
    if(!started) return;
    const remaining = target.slice(typed.length);
    const c1 = remaining[0];
    const c2 = remaining[1];

    if(c1){
      const code1 = codeForChar(c1);
      const el1 = code1 ? keyElsByCode.get(code1) : null;
      if(el1) el1.classList.add("hl-red");
    }
    if(c2){
      const code2 = codeForChar(c2);
      const el2 = code2 ? keyElsByCode.get(code2) : null;
      if(el2) el2.classList.add("hl-blue");
    }
  }

  function pressFlash(code){
    const el = keyElsByCode.get(code);
    if(!el) return;
    el.classList.add("pressed");
    setTimeout(() => el.classList.remove("pressed"), 70);
  }

  /* ---------------------------
     Input handling
     --------------------------- */
  function start(){
    started = true;
    setStatusPlaying();
    typed = "";
    renderRoma();
    updateHighlights();
  }

  function normalizeKey(e){
    // we only accept letters, digits, and listed punctuation used in romaji
    if(e.key.length === 1){
      return e.key.toLowerCase();
    }
    return null;
  }

  function anyVariantMatchesPrefix(prefix){
    return variants.some(v => v.startsWith(prefix));
  }

  function isComplete(prefix){
    return variants.includes(prefix);
  }

  function acceptChar(ch){
    const next = typed + ch;

    if(!anyVariantMatchesPrefix(next)){
      missSound();
      shake();
      streak = 0;
      return false;
    }

    typed = next;

    // if one variant fully matches, choose it as current target for display
    // (keeps highlights correct even if user typed alternative spelling)
    const completed = variants.find(v => v === typed);
    if(completed){
      target = completed;
    }else{
      // keep target as shortest matching variant to make remaining display stable
      const m = variants.filter(v => v.startsWith(typed)).sort((a,b)=>a.length-b.length)[0];
      if(m) target = m;
    }

    renderRoma();
    updateHighlights();

    if(isComplete(typed)){
      // success
      streak += 1;
      fanfare(streak);
      fireworkAtCenter(streak);
      setStatusCorrect();

      // advance
      setTimeout(() => {
        typed = "";
        // 通し/行: 次へ
        nextQuestion();
      }, 220);
    }

    return true;
  }

  document.addEventListener("keydown", (e) => {
    // resume audio on first user action
    if(!audioReady){
      // only on user gesture; keydown qualifies
      ensureAudio();
    }

    // Space starts
    if(e.code === "Space"){
      e.preventDefault();
      pressFlash("Space");
      if(!started){
        start();
      }
      return;
    }

    // allow mode buttons by mouse; keyboard ignores unless started
    if(!started) return;

    // visual flash for pressed keys on shown keyboard
    if(keyElsByCode.has(e.code)) pressFlash(e.code);

    const ch = normalizeKey(e);
    if(!ch) return;

    // block browser shortcuts interfering
    if(e.metaKey || e.ctrlKey || e.altKey) return;

    // accept
    const ok = acceptChar(ch);
    if(!ok){
      // keep display as-is; do not clear typed
      // (kids see remaining stays)
    }
  }, {passive:false});

  /* ---------------------------
     Init
     --------------------------- */
  resetRound();

  // small: clicking background focuses
  document.body.addEventListener("pointerdown", () => {
    if(!audioReady){
      ensureAudio();
    }
  });

})();
</script>
