<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>かなタイピングれんしゅう</title>
  <style>
    :root{
      --bg:#fcfcff;
      --card:#ffffff;
      --text:#111827;
      --sub:#6b7280;
      --line:#e5e7eb;
      --accent:#111827;
      --ok:#16a34a;
      --miss:#dc2626;
      --yellow:#facc15;
      --blue:#60a5fa;
      --pink:#f9a8d4;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:
        "Hiragino Sans","Yu Gothic","Meiryo",system-ui,-apple-system,sans-serif;
      background:linear-gradient(180deg,#ffffff 0%, #f8fbff 100%);
      color:var(--text);
      min-height:100vh;
    }
    .wrap{
      max-width:920px;
      margin:0 auto;
      padding:20px 16px 40px;
    }
    .topbar{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom:16px;
    }
    .title{
      font-size:20px;
      font-weight:800;
      letter-spacing:.04em;
    }
    .controls{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
    }
    button{
      border:1px solid var(--line);
      background:#fff;
      color:var(--text);
      border-radius:999px;
      padding:10px 14px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:.15s transform,.15s background,.15s border-color,.15s box-shadow;
      box-shadow:0 1px 0 rgba(0,0,0,.02);
    }
    button:hover{transform:translateY(-1px)}
    button.active{
      background:var(--accent);
      color:#fff;
      border-color:var(--accent);
    }

    .main{
      background:rgba(255,255,255,.82);
      backdrop-filter:blur(8px);
      border:1px solid rgba(229,231,235,.9);
      border-radius:28px;
      padding:20px 18px 28px;
      position:relative;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(17,24,39,.04);
    }

    .meta{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }
    .pill{
      border:1px solid var(--line);
      background:#fff;
      border-radius:999px;
      padding:8px 12px;
      font-size:13px;
      color:var(--sub);
      font-weight:700;
      min-width:92px;
      text-align:center;
    }

    .stage{
      min-height:360px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      position:relative;
    }

    .countdown{
      font-size:64px;
      font-weight:900;
      line-height:1;
      letter-spacing:.04em;
      min-height:76px;
      margin-bottom:6px;
    }

    .kana{
      font-size:clamp(56px, 12vw, 120px);
      font-weight:900;
      line-height:1.05;
      letter-spacing:.04em;
      margin:8px 0;
    }

    .romaji{
      font-size:clamp(22px, 4vw, 34px);
      font-weight:800;
      letter-spacing:.14em;
      color:var(--sub);
      min-height:44px;
      margin-top:6px;
    }

    .typed{
      margin-top:12px;
      min-height:34px;
      font-size:24px;
      font-weight:900;
      letter-spacing:.08em;
    }
    .typed .done{color:var(--ok)}
    .typed .rest{color:#cbd5e1}
    .typed.missFlash{animation:shake .18s linear 1}
    @keyframes shake{
      0%{transform:translateX(0)}
      25%{transform:translateX(-5px)}
      50%{transform:translateX(5px)}
      75%{transform:translateX(-4px)}
      100%{transform:translateX(0)}
    }

    .hint{
      margin-top:18px;
      color:var(--sub);
      font-size:14px;
      font-weight:700;
    }

    .progressWrap{
      margin:20px auto 0;
      max-width:560px;
    }
    .progressText{
      display:flex;
      justify-content:space-between;
      font-size:13px;
      color:var(--sub);
      font-weight:700;
      margin-bottom:8px;
    }
    .bar{
      height:14px;
      background:#eef2f7;
      border-radius:999px;
      overflow:hidden;
      border:1px solid #e5e7eb;
    }
    .fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--blue),var(--pink),var(--yellow));
      transition:width .2s ease;
    }

    .result{
      display:none;
      margin-top:22px;
      border-top:1px solid var(--line);
      padding-top:18px;
    }
    .result.show{display:block}
    .resultTitle{
      font-size:24px;
      font-weight:900;
      text-align:center;
      margin-bottom:14px;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }
    .box{
      border:1px solid var(--line);
      background:#fff;
      border-radius:20px;
      padding:16px;
      text-align:center;
    }
    .label{
      color:var(--sub);
      font-size:13px;
      font-weight:700;
      margin-bottom:8px;
    }
    .value{
      font-size:28px;
      font-weight:900;
    }

    .best{
      margin-top:16px;
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:12px;
    }

    .footerNote{
      margin-top:16px;
      text-align:center;
      color:var(--sub);
      font-size:13px;
      font-weight:700;
    }

    .burst{
      position:absolute;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }
    .star{
      position:absolute;
      width:12px;
      height:12px;
      border-radius:50%;
      opacity:.95;
      animation:pop .7s ease-out forwards;
    }
    @keyframes pop{
      0%{transform:translate(0,0) scale(.2); opacity:0}
      12%{opacity:1}
      100%{transform:translate(var(--dx), var(--dy)) scale(1.1); opacity:0}
    }

    .sparkle{
      position:absolute;
      font-size:28px;
      font-weight:900;
      animation:floatUp .8s ease-out forwards;
      pointer-events:none;
    }
    @keyframes floatUp{
      0%{transform:translateY(10px) scale(.7); opacity:0}
      15%{opacity:1}
      100%{transform:translateY(-48px) scale(1.15); opacity:0}
    }

    @media (max-width:700px){
      .grid,.best{grid-template-columns:1fr}
      .main{padding:16px 14px 24px}
      .kana{margin-top:2px}
      .countdown{font-size:52px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div class="title">かなタイピングれんしゅう</div>
      <div class="controls">
        <button class="modeBtn active" data-mode="basic">50音</button>
        <button class="modeBtn" data-mode="daku">だくおん</button>
        <button class="modeBtn" data-mode="youon">きゃきゅきょ</button>
        <button class="modeBtn" data-mode="all">ぜんぶ</button>
        <button id="restartBtn">さいしょから</button>
      </div>
    </div>

    <div class="main">
      <div class="meta">
        <div class="pill" id="modeLabel">50音</div>
        <div class="pill" id="qLabel">0 / 0</div>
        <div class="pill" id="accLabel">せいかくりつ 100%</div>
      </div>

      <div class="stage">
        <div class="burst" id="burst"></div>
        <div class="countdown" id="countdown"></div>
        <div class="kana" id="kana">ひらがな</div>
        <div class="romaji" id="romaji">PRESS ENTER</div>
        <div class="typed" id="typed"></div>
        <div class="hint" id="hint">Enterキーでスタート</div>
      </div>

      <div class="progressWrap">
        <div class="progressText">
          <span>しんちょく</span>
          <span id="progressText">0%</span>
        </div>
        <div class="bar">
          <div class="fill" id="fill"></div>
        </div>
      </div>

      <div class="result" id="result">
        <div class="resultTitle">できた！</div>
        <div class="grid">
          <div class="box">
            <div class="label">せいかくりつ</div>
            <div class="value" id="finalAcc">0%</div>
          </div>
          <div class="box">
            <div class="label">ミス</div>
            <div class="value" id="finalMiss">0</div>
          </div>
          <div class="box">
            <div class="label">かかったじかん</div>
            <div class="value" id="finalTime">0.0s</div>
          </div>
          <div class="box">
            <div class="label">れんしゅうした もじ</div>
            <div class="value" id="finalCount">0</div>
          </div>
        </div>

        <div class="best">
          <div class="box">
            <div class="label">ベスト せいかくりつ</div>
            <div class="value" id="bestAcc">-</div>
          </div>
          <div class="box">
            <div class="label">ベスト ミスすくなさ</div>
            <div class="value" id="bestMiss">-</div>
          </div>
        </div>

        <div class="footerNote">Enterキーでもういちど</div>
      </div>
    </div>
  </div>

  <script>
    const BASIC = [
      ["あ",["a"]],["い",["i","yi"]],["う",["u","wu","whu"]],["え",["e"]],["お",["o"]],
      ["か",["ka","ca"]],["き",["ki"]],["く",["ku","cu","qu"]],["け",["ke"]],["こ",["ko","co"]],
      ["さ",["sa"]],["し",["shi","si","ci"]],["す",["su"]],["せ",["se","ce"]],["そ",["so"]],
      ["た",["ta"]],["ち",["chi","ti"]],["つ",["tsu","tu"]],["て",["te"]],["と",["to"]],
      ["な",["na"]],["に",["ni"]],["ぬ",["nu"]],["ね",["ne"]],["の",["no"]],
      ["は",["ha"]],["ひ",["hi"]],["ふ",["fu","hu"]],["へ",["he"]],["ほ",["ho"]],
      ["ま",["ma"]],["み",["mi"]],["む",["mu"]],["め",["me"]],["も",["mo"]],
      ["や",["ya"]],["ゆ",["yu"]],["よ",["yo"]],
      ["ら",["ra"]],["り",["ri"]],["る",["ru"]],["れ",["re"]],["ろ",["ro"]],
      ["わ",["wa"]],["を",["wo","o"]],
      ["ん",["nn","xn"]]
    ];

    const DAKU = [
      ["が",["ga"]],["ぎ",["gi"]],["ぐ",["gu"]],["げ",["ge"]],["ご",["go"]],
      ["ざ",["za"]],["じ",["ji","zi"]],["ず",["zu"]],["ぜ",["ze"]],["ぞ",["zo"]],
      ["だ",["da"]],["ぢ",["di","ji"]],["づ",["du","zu"]],["で",["de"]],["ど",["do"]],
      ["ば",["ba"]],["び",["bi"]],["ぶ",["bu"]],["べ",["be"]],["ぼ",["bo"]],
      ["ぱ",["pa"]],["ぴ",["pi"]],["ぷ",["pu"]],["ぺ",["pe"]],["ぽ",["po"]]
    ];

    const YOUON = [
      ["きゃ",["kya"]],["きゅ",["kyu"]],["きょ",["kyo"]],
      ["しゃ",["sha","sya"]],["しゅ",["shu","syu"]],["しょ",["sho","syo"]],
      ["ちゃ",["cha","tya","cya"]],["ちゅ",["chu","tyu","cyu"]],["ちょ",["cho","tyo","cyo"]],
      ["にゃ",["nya"]],["にゅ",["nyu"]],["にょ",["nyo"]],
      ["ひゃ",["hya"]],["ひゅ",["hyu"]],["ひょ",["hyo"]],
      ["みゃ",["mya"]],["みゅ",["myu"]],["みょ",["myo"]],
      ["りゃ",["rya"]],["りゅ",["ryu"]],["りょ",["ryo"]],
      ["ぎゃ",["gya"]],["ぎゅ",["gyu"]],["ぎょ",["gyo"]],
      ["じゃ",["ja","jya","zya"]],["じゅ",["ju","jyu","zyu"]],["じょ",["jo","jyo","zyo"]],
      ["びゃ",["bya"]],["びゅ",["byu"]],["びょ",["byo"]],
      ["ぴゃ",["pya"]],["ぴゅ",["pyu"]],["ぴょ",["pyo"]]
    ];

    const MODES = {
      basic:{ label:"50音", list:BASIC },
      daku:{ label:"だくおん", list:DAKU },
      youon:{ label:"きゃきゅきょ", list:YOUON },
      all:{ label:"ぜんぶ", list:[...BASIC, ...DAKU, ...YOUON] }
    };

    const modeButtons = document.querySelectorAll(".modeBtn");
    const restartBtn = document.getElementById("restartBtn");
    const modeLabel = document.getElementById("modeLabel");
    const qLabel = document.getElementById("qLabel");
    const accLabel = document.getElementById("accLabel");
    const countdownEl = document.getElementById("countdown");
    const kanaEl = document.getElementById("kana");
    const romajiEl = document.getElementById("romaji");
    const typedEl = document.getElementById("typed");
    const hintEl = document.getElementById("hint");
    const fillEl = document.getElementById("fill");
    const progressText = document.getElementById("progressText");
    const resultEl = document.getElementById("result");
    const burstEl = document.getElementById("burst");

    const finalAcc = document.getElementById("finalAcc");
    const finalMiss = document.getElementById("finalMiss");
    const finalTime = document.getElementById("finalTime");
    const finalCount = document.getElementById("finalCount");
    const bestAcc = document.getElementById("bestAcc");
    const bestMiss = document.getElementById("bestMiss");

    let currentMode = "basic";
    let questions = [];
    let index = 0;
    let activeAnswers = [];
    let typed = "";
    let started = false;
    let finished = false;
    let totalKeys = 0;
    let missCount = 0;
    let startTime = 0;
    let audioCtx = null;

    function initAudio(){
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioCtx.state === "suspended") audioCtx.resume();
    }

    function tone(freq=440, duration=0.08, type="sine", gainValue=0.05, startAt=0){
      if (!audioCtx) return;
      const now = audioCtx.currentTime + startAt;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(gainValue, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function playTypeSound(){
      tone(800,0.035,"square",0.018,0);
      tone(1200,0.025,"triangle",0.008,0.01);
    }

    function playMissSound(){
      tone(210,0.09,"sawtooth",0.035,0);
      tone(170,0.12,"sawtooth",0.025,0.02);
    }

    function playSuccessSound(){
      tone(740,0.05,"triangle",0.03,0);
      tone(988,0.07,"triangle",0.028,0.04);
      tone(1318,0.10,"triangle",0.026,0.09);
    }

    function playClearFanfare(){
      tone(523,0.09,"triangle",0.03,0);
      tone(659,0.10,"triangle",0.03,0.10);
      tone(784,0.12,"triangle",0.03,0.20);
      tone(1046,0.18,"triangle",0.04,0.34);
    }

    function shuffle(arr){
      const a = [...arr];
      for(let i=a.length-1;i>0;i--){
        const j = Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
      }
      return a;
    }

    function setMode(mode){
      currentMode = mode;
      modeButtons.forEach(btn => btn.classList.toggle("active", btn.dataset.mode === mode));
      modeLabel.textContent = MODES[mode].label;
      resetScreenOnly();
      showIdle();
    }

    function resetScreenOnly(){
      resultEl.classList.remove("show");
      countdownEl.textContent = "";
      kanaEl.textContent = "ひらがな";
      romajiEl.textContent = "PRESS ENTER";
      typedEl.innerHTML = "";
      typedEl.classList.remove("missFlash");
      hintEl.textContent = "Enterキーでスタート";
      qLabel.textContent = "0 / 0";
      accLabel.textContent = "せいかくりつ 100%";
      fillEl.style.width = "0%";
      progressText.textContent = "0%";
      burstEl.innerHTML = "";
      started = false;
      finished = false;
      totalKeys = 0;
      missCount = 0;
      index = 0;
      typed = "";
      activeAnswers = [];
    }

    function showIdle(){
      const total = MODES[currentMode].list.length;
      qLabel.textContent = `0 / ${total}`;
    }

    function startGame(){
      initAudio();
      resetScreenOnly();
      questions = shuffle(MODES[currentMode].list);
      qLabel.textContent = `0 / ${questions.length}`;
      let seq = ["3","2","1","GO!"];
      let i = 0;
      hintEl.textContent = "";
      countdownEl.textContent = seq[0];
      tone(600,0.06,"square",0.025,0);
      const timer = setInterval(()=>{
        i++;
        if(i < seq.length){
          countdownEl.textContent = seq[i];
          if(seq[i] !== "GO!"){
            tone(600,0.06,"square",0.025,0);
          }else{
            tone(720,0.06,"square",0.03,0);
            tone(980,0.10,"triangle",0.02,0.07);
          }
        }else{
          clearInterval(timer);
          countdownEl.textContent = "";
          started = true;
          startTime = performance.now();
          nextQuestion();
        }
      }, 650);
    }

    function nextQuestion(){
      if(index >= questions.length){
        finishGame();
        return;
      }
      typed = "";
      activeAnswers = [...questions[index][1]];
      kanaEl.textContent = questions[index][0];
      romajiEl.textContent = activeAnswers[0].toUpperCase();
      renderTyped();
      qLabel.textContent = `${index + 1} / ${questions.length}`;
      updateProgress();
    }

    function renderTyped(){
      const target = activeAnswers[0];
      const done = typed;
      const rest = target.slice(typed.length);
      typedEl.innerHTML = `<span class="done">${done}</span><span class="rest">${rest}</span>`;
    }

    function updateProgress(){
      const p = questions.length ? (index / questions.length) * 100 : 0;
      fillEl.style.width = `${p}%`;
      progressText.textContent = `${Math.round(p)}%`;
      const acc = totalKeys === 0 ? 100 : Math.max(0, Math.round(((totalKeys - missCount) / totalKeys) * 100));
      accLabel.textContent = `せいかくりつ ${acc}%`;
    }

    function burst(xRatio=0.5, yRatio=0.5, count=10){
      const colors = ["#facc15","#60a5fa","#f9a8d4","#86efac","#c4b5fd"];
      const rect = burstEl.getBoundingClientRect();
      const baseX = rect.width * xRatio;
      const baseY = rect.height * yRatio;
      for(let i=0;i<count;i++){
        const s = document.createElement("div");
        s.className = "star";
        s.style.left = `${baseX}px`;
        s.style.top = `${baseY}px`;
        s.style.background = colors[Math.floor(Math.random()*colors.length)];
        const dx = `${(Math.random()*180 - 90)}px`;
        const dy = `${(Math.random()*180 - 90)}px`;
        s.style.setProperty("--dx", dx);
        s.style.setProperty("--dy", dy);
        burstEl.appendChild(s);
        setTimeout(()=>s.remove(), 760);
      }
    }

    function sparkle(text="◎"){
      const sp = document.createElement("div");
      sp.className = "sparkle";
      sp.textContent = text;
      sp.style.left = `${50 + (Math.random()*20 - 10)}%`;
      sp.style.top = `${42 + (Math.random()*10 - 5)}%`;
      burstEl.appendChild(sp);
      setTimeout(()=>sp.remove(), 850);
    }

    function saveBest(acc, miss){
      const key = `kanaTypingBest_${currentMode}`;
      const prev = JSON.parse(localStorage.getItem(key) || "null");
      const next = {
        bestAcc: prev ? Math.max(prev.bestAcc, acc) : acc,
        bestMiss: prev ? Math.min(prev.bestMiss, miss) : miss
      };
      localStorage.setItem(key, JSON.stringify(next));
      return next;
    }

    function loadBest(){
      const key = `kanaTypingBest_${currentMode}`;
      return JSON.parse(localStorage.getItem(key) || "null");
    }

    function finishGame(){
      started = false;
      finished = true;
      const elapsed = ((performance.now() - startTime) / 1000);
      const acc = totalKeys === 0 ? 100 : Math.max(0, Math.round(((totalKeys - missCount) / totalKeys) * 100));
      const best = saveBest(acc, missCount);

      finalAcc.textContent = `${acc}%`;
      finalMiss.textContent = `${missCount}`;
      finalTime.textContent = `${elapsed.toFixed(1)}s`;
      finalCount.textContent = `${questions.length}`;
      bestAcc.textContent = `${best.bestAcc}%`;
      bestMiss.textContent = `${best.bestMiss}`;
      fillEl.style.width = "100%";
      progressText.textContent = "100%";

      kanaEl.textContent = "おわり！";
      romajiEl.textContent = "ENTER";
      typedEl.innerHTML = "";
      hintEl.textContent = "";
      resultEl.classList.add("show");

      playClearFanfare();
      for(let i=0;i<4;i++){
        setTimeout(()=>burst(0.5,0.45,18), i*140);
      }
      sparkle("★");
      setTimeout(()=>sparkle("★"),150);
      setTimeout(()=>sparkle("★"),300);
    }

    function handleInput(key){
      if(!started || finished) return;
      if(key.length !== 1) return;
      const ch = key.toLowerCase();
      if(!/^[a-z]$/.test(ch)) return;

      totalKeys++;

      const nextCandidates = activeAnswers.filter(ans => ans.startsWith(typed + ch));

      if(nextCandidates.length > 0){
        typed += ch;
        activeAnswers = nextCandidates;
        renderTyped();
        playTypeSound();

        if(activeAnswers.some(ans => ans === typed)){
          playSuccessSound();
          burst(0.5,0.43,10);
          sparkle("✦");
          index++;
          updateProgress();
          setTimeout(nextQuestion, 140);
        }
      }else{
        missCount++;
        typedEl.classList.remove("missFlash");
        void typedEl.offsetWidth;
        typedEl.classList.add("missFlash");
        playMissSound();
        burst(0.5,0.48,5);
        updateProgress();
      }
    }

    modeButtons.forEach(btn=>{
      btn.addEventListener("click", ()=> setMode(btn.dataset.mode));
    });

    restartBtn.addEventListener("click", ()=>{
      setMode(currentMode);
    });

    window.addEventListener("keydown", (e)=>{
      if(e.key === "Enter"){
        e.preventDefault();
        initAudio();
        if(!started){
          startGame();
        }else if(finished){
          startGame();
        }
        return;
      }
      handleInput(e.key);
    });

    // 初期表示
    setMode("basic");
    const best = loadBest();
    if(best){
      bestAcc.textContent = `${best.bestAcc}%`;
      bestMiss.textContent = `${best.bestMiss}`;
    }
  </script>
</body>
</html>
