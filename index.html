<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>五十音ローマ字タイピング（行ごと）</title>
  <style>
    :root{
      --fg:#111; --muted:#666; --line:#e9e9e9; --bg:#fff;
      --red:#b00020; --blue:#1357d6; --ok:#0a7a2f; --gold:#f2b705;
    }
    html,body{height:100%; margin:0; background:var(--bg); color:var(--fg);
      font-family: system-ui, -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", "Segoe UI", sans-serif;}
    .wrap{max-width:980px; margin:0 auto; padding:18px;}

    /* Header / Prompt */
    .top{
      display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;
      padding:10px 0 12px; border-bottom:1px solid var(--line);
    }
    .title{font-weight:900; font-size:16px;}
    .mini{color:var(--muted); font-size:12px; line-height:1.4;}
    .controls{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
    button{
      appearance:none; border:1px solid var(--line); background:#fff; color:var(--fg);
      padding:8px 10px; border-radius:10px; font-size:13px; cursor:pointer;
    }
    button:active{transform:translateY(1px);}
    select{
      border:1px solid var(--line); border-radius:10px; padding:8px 10px; background:#fff; font-size:13px;
    }
    .star{
      font-size:18px; font-weight:900;
      color:#bbb;
    }
    .star.done{ color: var(--gold); }

    .prompt{
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:18px 0 10px;
      gap:10px;
    }
    .kana{
      font-size:120px; font-weight:900; line-height:1; user-select:none;
    }
    .seq{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size:18px; letter-spacing:.08em;
      user-select:none;
    }
    .seq .done{color:var(--ok); font-weight:900;}
    .seq .r{color:var(--red); font-weight:900;}
    .seq .b{color:var(--blue); font-weight:900;}
